<script>
// ---------------------------------------------------------------------------
// playground v3: the press is parked. the puzzle layer arrives —
// sand floors that crumble once crossed, a key found early for a chest
// found late, wall mazes on every ring, two counter-rotating bands,
// pads that now fire when rolled onto (the v2 bug), and more spikes.
// ---------------------------------------------------------------------------
const N = 20, H = 64;
const P = [];
for(let x = 0; x < 5; x++) P.push([x, 5]);
for(let z = 5; z > 0; z--) P.push([5, z]);
for(let x = 5; x > 0; x--) P.push([x, 0]);
for(let z = 0; z < 5; z++) P.push([0, z]);
const ANGraw = P.map(([x, z]) => Math.atan2(x - 2.5, z - 2.5));
const ANG = []; let acc0 = ANGraw[0];
for(let i = 0; i < N; i++){
  if(i > 0){ let d = ANGraw[i] - ANGraw[i - 1]; while(d <= 0) d += Math.PI * 2; acc0 += d; }
  ANG.push(acc0);
}
const TWO = Math.PI * 2;
const angOf = K => ANG[((K % N) + N) % N] + TWO * Math.floor(K / N);
const midOf = K => (angOf(K) + angOf(K + 1)) / 2;
const angAt = p => { const f = Math.floor(p); return angOf(f) + (angOf(f + 1) - angOf(f)) * (p - f); };
const Pat = p => { const f = ((Math.floor(p) % N) + N) % N, c = (f + 1) % N, fr = p - Math.floor(p);
  return [P[f][0] + (P[c][0] - P[f][0]) * fr, P[f][1] + (P[c][1] - P[f][1]) * fr]; };
const mod = c => ((c % N) + N) % N;
const Kk = (c, r) => mod(c) + ',' + r;

// --- per-face sticky geometry: one source of truth shared by physics, render, and the editor's faceDir ---
const unit2 = (x, z) => { const m = Math.hypot(x, z) || 1; return [x / m, 0, z / m]; };
function cardinalOut(c){ const ox = P[mod(c)][0] - 2.5, oz = P[mod(c)][1] - 2.5; return Math.abs(ox) >= Math.abs(oz) ? [Math.sign(ox) || 1, 0, 0] : [0, 0, Math.sign(oz) || 1]; }
function faceDirG(c, F){                                   // outward normal of face F (away from the block, toward the clung hero)
  if(F === 'B') return [0, -1, 0];                          // ceiling underside
  if(F === 'L'){ const a = P[mod(c)], b = P[mod(c - 1)]; return unit2(b[0] - a[0], b[1] - a[1]); }
  if(F === 'R'){ const a = P[mod(c)], b = P[mod(c + 1)]; return unit2(b[0] - a[0], b[1] - a[1]); }
  const o = cardinalOut(c); return F === 'O' ? o : [-o[0], 0, -o[2]];
}
const clHeroCol = (bc, F) => F === 'L' ? mod(bc - 1) : F === 'R' ? mod(bc + 1) : mod(bc);   // column the hero occupies while clung

function edgeLine(c){ return new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.5 })); }

function setMouth(g, kind){

function makeFace(kind){
  const g = new THREE.Group();
  const mk = (sx, sy) => { const e = new THREE.Mesh(box, faceMat); e.scale.set(sx, sy, 0.03); g.add(e); return e; };

}
function attachFaces(grp, sideKind, topKind){
  const list = [];
  for(let f2 = 0; f2 < 4; f2++){
    const fg = makeFace(sideKind);
    const a2 = f2 * Math.PI / 2;
    fg.rotation.y = a2;
    fg.position.set(Math.sin(a2) * 0.43, 0.04, Math.cos(a2) * 0.43);
    grp.add(fg); list.push(fg);
  }
  const tg = makeFace(topKind);
  tg.rotation.x = -Math.PI / 2;
  tg.position.y = 0.44;
  grp.add(tg); list.push(tg);

}

// quantized depth grading: five bands, block by block, desaturated and sunk
// toward the dark the further around the tower a cube sits. recomputed from
// the rotated depth, so the far side is always the muted side.
const BG = new THREE.Color(0x10141d);
const DEPTH_BANDS = 5;
function gradeColor(base, b){
  const t = b / (DEPTH_BANDS - 1);
  const c = base.clone();
  const l = c.r * 0.299 + c.g * 0.587 + c.b * 0.114;
  c.lerp(new THREE.Color(l, l, l), t * 0.55);
  c.lerp(BG, t * 0.45);
  return c;
}
let depthReg = [];
function regDepth(mesh, materials){
  const entries = materials.map(mt => ({ mt, graded: Array.from({ length: DEPTH_BANDS }, (_, b) => gradeColor(mt.color.clone(), b)), baseOp: mt.opacity }));
  depthReg.push({ mesh, entries, lastBand: -1 });
}
const hero = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xd9a13a }));
hero.scale.set(0.92, 0.92, 0.92);
hero.add(edgeLine(0xffe8b0));
tower.add(hero);

// --- world ---
let solidSet, pads, sticky, wallSticky, faceSet, sandSet, sandTimers, spikes, cspikes, coinsSet, keySet, chestSet, doorSet, countDoorSet, crackedSet, MONSTERS, BANDS;
let cubeList, coinMeshes, keyMeshes, bandCubes, spikeMeshes, sandMeshes, chestMeshes, doorMeshes, countDoorMeshes;
function solid(c, r){
  if(r < 0) return true;
  for(const B of BANDS) if(r >= B.r0 && r <= B.r1) return B.set.has(Kk(c - B.off, r));
  return solidSet.has(Kk(c, r)) || chestSet.has(Kk(c, r)) || doorSet.has(Kk(c, r)) || countDoorSet.has(Kk(c, r));
}
function faced(c, r, F){ return faceSet.has(Kk(c, r) + ',' + F); }   // single-sided sticky test (the painted face exists here)
function clearGroup(){
  for(let i = tower.children.length - 1; i >= 0; i--){ const ch = tower.children[i]; if(ch !== hero) tower.remove(ch); }
}
// ---- custom level from the editor's "play" button (passed in the URL hash: game.html#play=<json>) ----
let CUSTOM = null;
function loadCustom(){
  const m = (location.hash || '').match(/[#&]play=([^&]+)/);
  let data = null;
  if(m){ try { data = JSON.parse(decodeURIComponent(m[1])); } catch(e){} }
  if(!data && window.TOWER_LEVEL && typeof window.TOWER_LEVEL === 'object') data = window.TOWER_LEVEL;   // baked-in level for deployment (a deploy index.html sets window.TOWER_LEVEL before this script)
  if(!data) return null;
  const lines = (data.code || '').replace(/\r/g, '').split('\n').filter(l => l.length);
  let body = /^ROOM/.test(lines[0]) ? lines.slice(1) : lines;
  let stickLines = [];
  const si = body.findIndex(l => l.trim() === 'STICK');
  if(si >= 0){ stickLines = body.slice(si + 1); body = body.slice(0, si); }   // per-face sticky section
  if(!body.length) return null;
  return { body, rows: body.length, BASE: 2, dividers: (data.dividers || []).filter(d => d > 0).sort((a, b) => a - b), stickLines };
}
function mkMon(c, wr, type){ return { row: wr, c, dir: 1, speed: 1.6, state: 'alive', thawT: 0, grp: null, bodyMat: null, type, phase: 'happy', rideT: 0, lastCell: c, faces: null }; }
function populateCustom(){
  BANDS = [];   // editor levels have no moving platforms
  const { body, rows, BASE, dividers } = CUSTOM;
  const bandFloors = [0]; for(const d of dividers) if(d > 0 && d < rows) bandFloors.push(d);   // editor floor row of each level band
  const floorForRow = lr => { let f = 0; for(const d of bandFloors) if(d <= lr) f = d; return f; };
  const spawn = {};
  for(let lr = 0; lr < rows; lr++){
    const line = body[(rows - 1) - lr] || '';     // body[0] = top row; local row 0 = bottom
    const wr = lr + BASE;
    for(let c = 0; c < N; c++){
      const ch = line[c] || '.', k = Kk(c, wr);
      switch(ch){
        case '#': solidSet.add(k); break;
        case 'S': solidSet.add(k); spawn[floorForRow(lr)] = [c, wr + 1]; break;
        case 'O': break;                            // open hole — fall through
        case 'D': doorSet.add(k); break;
        case 'C': solidSet.add(k); crackedSet.add(k); break;
        case 'N': solidSet.add(k); sandSet.add(k); break;   // sand: crumbles after you stand on it
        case '^': solidSet.add(k); spikes.add(Kk(c, wr + 1)); break;
        case 'v': solidSet.add(k); spikes.add(Kk(c, wr - 1)); cspikes.add(Kk(c, wr - 1)); break;
        case 'P': solidSet.add(k); pads.add(k); break;
        case 'U': solidSet.add(k); sticky.add(k); break;
        case '[': case ']': solidSet.add(k); wallSticky.add(k); break;
        case 'H': solidSet.add(k); wallSticky.add(k); sticky.add(k); break;
        case 'o': coinsSet.add(k); break;
        case 'K': keySet.add(k); break;
        case 'x': MONSTERS.push(mkMon(c, wr, 'spiky')); break;
        case 'm': MONSTERS.push(mkMon(c, wr, 'normal')); break;
        case '@': MONSTERS.push(mkMon(c, wr, 'mount')); break;
      }
    }
  }
  for(const sl of (CUSTOM.stickLines || [])){   // per-face sticky → the editor painted these EXACT faces (single-sided)
    const mm = sl.trim().match(/^(\d+),(\d+)\s+([TBLROI]+)$/); if(!mm) continue;
    const c = +mm[1], wr = (+mm[2]) + BASE, f = mm[3];
    for(const F of f){ if('BLROI'.includes(F)) faceSet.add(Kk(c, wr) + ',' + F); }   // T ignored (you never cling to a top)
  }
  const floorsDesc = bandFloors.slice().sort((a, b) => b - a);   // top band first
  CUSTOM.bands = floorsDesc.map(fEd => {
    let e = spawn[fEd];
    if(!e){ let sc = 0; for(let c = 0; c < N; c++) if(solidSet.has(Kk(c, fEd + BASE))){ sc = c; break; } e = [sc, fEd + BASE + 1]; }

}
function customBand(y){ const b = CUSTOM.bands; let i = 0; while(i < b.length - 1 && y <= b[i].floorWorld) i++; return i; }
function buildWorld(){
  solidSet = new Set(); pads = new Set(); sticky = new Set(); wallSticky = new Set(); faceSet = new Set(); sandSet = new Set();

  else {
  const ROOMTOP = { R2:52,R3:46,R4:35,R5:29,R6:22 }, ROOMFLOOR = { R2:46,R3:35,R4:29,R5:22,R6:14 };

    { r0: 19, r1: 19, off: 0, t: 0, period: 2.1, stepDur: 0.32, anim: 0, dir: -1, set: new Set() },

  coinsSet.add(Kk(4, 53)); coinsSet.add(Kk(8, 52)); coinsSet.add(Kk(9, 54)); coinsSet.add(Kk(11, 53)); coinsSet.add(Kk(12, 53));
  // ---- rooms two..six: GENERATED layouts (seed 7, solver-certified: solvable, never stuck, twists forced) ----
  const GEN = [{"name":"R2","S":["5,46","6,46","7,46","8,46","9,46","10,46","11,46","12,46","13,46","15,46","4,47","16,47","4,48","16,48","4,49","16,49","4,50","16,50","4,51","16,51","6,49","7,47","5,47","5,48","9,47","9,48","9,49","8,47"],"pads":["13,46"],"sticky":[],"wsticky":["5,47","5,48"],"spikes":[],"cracked":[],"doors":["14,46"],"keys":["5,49"],"coins":["8,48","7,48"],"mon":{"row":47,"c":15,"speed":1.7,"type":"mount"},"bandSticky":[]},{"name":"R3","S":["10,35","11,35","12,35","13,35","14,35","15,35","16,35","17,35","18,35","7,36","19,36","7,37","19,37","7,38","19,38","7,40","19,40","7,41","19,41","7,42","19,42","7,43","19,43","7,44","19,44","7,45","19,45","9,36","9,37","13,36","13,37","15,36","16,36","16,37","16,38"],"pads":["10,35"],"sticky":[],"wsticky":["16,36","16,37","16,38"],"spikes":[],"cracked":["9,36"],"doors":[],"keys":[],"coins":["16,39","14,36","8,36"],"mon":null,"bandSticky":[]},{"name":"R4","S":["3,29","5,29","6,29","7,29","8,29","9,29","10,29","11,29","12,29","13,29","2,30","14,30","2,31","14,31","2,32","14,32","2,33","14,33","2,34","14,34","12,30","6,30","3,33","13,30","13,32","12,32","11,32","10,32","10,30","10,31"],"pads":["7,29","5,29"],"sticky":[],"wsticky":["10,30","10,31","10,32"],"spikes":[],"cracked":["10,32"],"doors":["4,29"],"keys":["13,31"],"coins":["3,30"],"mon":{"row":30,"c":3,"speed":1.6,"type":"mount"},"bandSticky":[]},{"name":"R5","S":["2,22","3,22","4,22","5,22","6,22","7,22","8,22","9,22","10,22","11,22","12,22","1,23","13,23","1,24","13,24","1,25","13,25","1,26","13,26","1,27","13,27","1,28","13,28","3,26","5,23","5,24","6,23","6,24","6,25","6,26","7,26","8,26","9,26","2,23"],"pads":["12,22","10,22"],"sticky":[],"wsticky":["5,23","5,24","6,23","6,24","6,25","6,26"],"spikes":[],"cracked":["9,22"],"doors":[],"keys":[],"coins":["12,23","4,23"],"mon":{"row":23,"c":12,"speed":1.7,"type":"spiky"},"bandSticky":[]},{"name":"R6","S":["0,14","1,14","2,14","3,14","4,14","5,14","6,14","7,14","8,14","9,14","10,14","11,14","12,14","13,14","14,14","15,14","18,14","19,14","18,15","18,16","7,15","19,15","19,16","16,15","16,16","5,15","5,16","13,15"],"pads":["10,14","12,14"],"sticky":[],"wsticky":["16,15","16,16","19,15","19,16"],"spikes":["16,17","18,17"],"cracked":["16,15"],"doors":[],"keys":[],"coins":["12,16","7,16","15,15"],"mon":null,"bandSticky":[1]}];
  for(const R of GEN){

  // soft speed cap: rot chases the target, velocity saturates instead of snapping.
  // SKIP entirely while riding a mount — the ride block owns rot and K; setRot() here would
  // nudge K and fight the carry, spinning the cube.
  if(!carrier && !(mode === 'cling' && clFace && !clTang(clFace))){   // only vertical (L/R) cling consumes input as climb, not spin; walk-along faces keep the chase
    const lagD = rotTarget - rot;
    if(Math.abs(lagD) > 1e-5){
      const vel = Math.sign(lagD) * Math.min(Math.abs(lagD) * CHASE_K, ROTMAX);
      const want = rot + vel * dt;
      setRot(want);
      if(Math.abs(rot - want) > 1e-9){ rotTarget = rot; omega = 0; airCarry = 0; }
    }
  }
  if(!driving && !carrier && Math.abs(omega) <= 0.6 && carryT <= 0 && !ridingNow && mode !== 'cling'){
    omega = 0;
    const hL = angOf(K) - midOf(K - 1), hR = midOf(K) - angOf(K);
    const da = (-rot) - angOf(K);
    const g = da >= 0 ? Math.min(0.5, da / (2 * hR)) : Math.max(-0.5, da / (2 * hL));
    if(Math.abs(g) > 1e-4){
      const dir = -Math.sign(g);
      if(Math.sign(tip) !== dir) tip = 0;
      tip += dir * TOPPLE_A * (0.35 + (0.5 - Math.abs(g))) * dt;
      let ng = g + tip * dt;
      if(Math.sign(ng) !== Math.sign(g) || ng === 0){ ng = 0; tip = 0; squash = Math.max(squash, 0.12); }
      rot = -(angOf(K) + ng * (ng >= 0 ? 2 * hR : 2 * hL));
      rotTarget = rot;
    } else tip = 0;
  } else tip = 0;

  // bands step on their own clocks, in their own directions
  for(const B of BANDS){
    B.t += dt;
    if(B.anim > 0) B.anim = Math.max(0, B.anim - dt);
    if(B.t >= B.period){
      B.t = 0;
      // a grounded rider on top, or a hanger on a sticky underside, goes with the platform
      let ride = false;
      if(mode === 'ground'){
        const sup = Math.floor(heroY + 0.02) - 1;
        if(sup >= B.r0 && sup <= B.r1 && B.set.has(Kk(col() - B.off, sup))) ride = true;
      } else if(mode === 'cling' && clFace === 'B'){
        const hr = clCell ? clCell[1] : Math.floor(heroY + 0.999);
        if(hr >= B.r0 && hr <= B.r1 && B.bottomSticky && B.set.has(Kk(col() - B.off, hr))) ride = true;
      }
      B.off += B.dir; B.anim = B.stepDur;
      if(ride && canEnter(K + B.dir)){
        const d0 = angOf(K + B.dir) - angOf(K);
        K += B.dir;
        rot -= d0; rotTarget -= d0; rotLag += d0;   // commit the ride; the view glides after it
      }
      for(let g = 0; g < 3; g++){
        if(mode !== 'dead' && rows().some(r => r >= B.r0 && r <= B.r1) && !canEnter(K)){ K += B.dir; rot = -angOf(K); rotTarget = rot; }
        else break;
      }
    }
  }
  // ride tween: locked to the platform's ease, abandoned the moment the finger moves
  if(carryT > 0){
    if(ptr !== null && (now - lastDrag) < 110){ carryT = 0; }
    else {
      carryT = Math.max(0, carryT - dt);
      const e = 1 - carryT / carryDur;
      const ee = e < 0.5 ? 2 * e * e : 1 - Math.pow(-2 * e + 2, 2) / 2;
      rot = carryFrom + (-angOf(K) - carryFrom) * ee;
      rotTarget = rot;
    }
  }

  // the tenant: patrol, contact, thaw
  ridingNow = false; rideFrac = null; if(!carrier) rideSteer = 0;
  for(const M of MONSTERS){
    if(mode === 'dead') break;
    if(M.state === 'alive'){
      const cc = Math.round(M.c);
      if(Math.abs(M.c - cc) < 0.03){
        const nxt = mod(cc + M.dir);
        if(solid(nxt, M.row) || !solid(nxt, M.row - 1)){ M.c = cc; M.dir *= -1; }
      }
      M.c += M.dir * M.speed * dt;
      if(M.type === 'mount'){
        const ridden = carrier === M && mode === 'ground' &&
          Math.abs(Math.floor(heroY + 0.02) - 1 - M.row) <= 0;
        if(ridden){
          ridingNow = true;
          if(Math.abs(rideSteer) >= 1){
            const sstep = rideSteer > 0 ? 1 : -1;
            rideSteer = 0;
            if(canEnter(K + sstep)){ justLeft = carrier; jlTimer = 0.9; K += sstep; carrier = null; rideFrac = null; mode = 'air'; vy = -8; }
          }
          if(carrier === M){
            const cc3 = Math.round(M.c);
            if(cc3 !== M.lastCell){
              const sstep2 = Math.sign(cc3 - M.lastCell);
              if(canEnter(K + sstep2)){ K += sstep2; M.lastCell = cc3; }
              else { M.c = M.lastCell; M.dir *= -1; }
            }
            const base = K - mod(K);
            let frac = base + mod(M.c);
            if(frac - K > N / 2) frac -= N; else if(frac - K < -N / 2) frac += N;
            rideFrac = frac;
            rot = -angAt(frac); rotTarget = rot;
          }
        }
        if(ridden){
          M.rideT += dt;
          const ph = M.rideT < 1 ? 'happy' : (M.rideT < 2 ? 'neutral' : 'frown');
          if(ph !== M.phase){
            M.phase = ph;
            for(const fg of M.faces) setMouth(fg, ph);
          }
          if(M.rideT >= 3) die("it turned.");
        }
      }
      if(mode === 'ground' && Math.floor(heroY + 0.02) === M.row){
        const d = Math.abs(((col() - M.c + N / 2) % N + N) % N - N / 2);
        if(d < 0.75 && spawnGuard <= 0 && (M.type !== 'mount' || M.phase === 'frown')) die("the tenant.");
      }
      if(M.type === 'mount' && carrier !== M && M.rideT !== 0 && mode !== 'ground'){
        M.rideT = 0; if(M.phase !== 'happy'){ M.phase = 'happy'; for(const fg of M.faces) setMouth(fg, 'happy'); }
      }
    } else {
      M.thawT -= dt;
      if(M.thawT <= 0){
        solidSet.delete(Kk(M.c, M.row));
        M.state = 'alive';
        if(mode === 'ground' && col() === mod(M.c) && Math.floor(heroY + 0.02) === M.row + 1) die("it woke up.");
      }
    }
  }

  // sand crumbles once stood on
  if(sandTimers.size){
    for(const [key, t0] of [...sandTimers]){
      const t = t0 - dt;
      const sm = sandMeshes.find(x => x.key === key);
      if(t <= 0){
        sandTimers.delete(key); sandSet.delete(key); solidSet.delete(key);
        if(sm){ tower.remove(sm.m); }
      } else {
        sandTimers.set(key, t);
        if(sm && t < 0.22){ const s2 = Math.max(0.05, t / 0.22); sm.m.scale.set(s2, s2, s2); }
      }
    }
  }

  if(mode === 'ground'){
    const sup = Math.floor(heroY + 0.02) - 1;
    if(carrier && solid(col(), sup)){ carrier = null; rideFrac = null; rideSteer = 0; }   // stepped onto solid floor: stop riding
    const supKey = Kk(col(), sup);
    if(pads.has(supKey)){ vy = -14; mode = 'air'; squash = 0; showMsg("sproing."); }
    else if(spikes.has(Kk(col(), sup + 1))){ die("the spikes."); }
    else if(doorSet.has(supKey)){
      if(keyCount > 0){
        doorSet.delete(supKey); keyCount--; hud();
        const i = doorMeshes.findIndex(d => d.key === supKey);
        if(i >= 0){ tower.remove(doorMeshes[i].m); doorMeshes.splice(i, 1); }
        showMsg("the key turns. the floor lets go.");
      } else if(lockMsgCd <= 0){ showMsg("locked underfoot. it wants a key."); lockMsgCd = 1.8; }
    }
    else if(mountUnder(sup)){
      const Mu = mountUnder(sup);
      if(carrier !== Mu){ carrier = Mu; rideSteer = 0; Mu.c = col(); Mu.lastCell = col(); }   // fresh bind
    }
    else if(!solid(col(), sup)){ mode = 'air'; vy = 0; carrier = null; }
    else if(sandSet.has(supKey) && !sandTimers.has(supKey)){ sandTimers.set(supKey, 2.0); showMsg("the sand gives."); }
    // the chest: push against it with the key
    if(mode === 'ground'){
      if(lockMsgCd > 0) lockMsgCd -= dt;
      const hL = angOf(K) - midOf(K - 1), hR = midOf(K) - angOf(K);
      const da = (-rot) - angOf(K);
      const g = da >= 0 ? Math.min(0.5, da / (2 * hR)) : Math.max(-0.5, da / (2 * hL));
      if(Math.abs(g) > 0.03){
        const s = Math.sign(g);
        const ck = Kk(K + s, Math.floor(heroY + 0.02));
        if(chestSet.has(ck)){
          if(keyCount > 0){
            chestSet.delete(ck); keyCount--; coinCount += 3; hud();
            const i = chestMeshes.findIndex(c => c.key === ck);
            if(i >= 0){ tower.remove(chestMeshes[i].m); chestMeshes.splice(i, 1); }
            showMsg("the chest opens. three coins.");
          } else if(lockMsgCd <= 0){ showMsg("locked. it wants a key."); lockMsgCd = 1.6; }
        }
      }
      // climb: lean into a single block and step on top of it
      if(Math.abs(g) > 0.035){
        const s = Math.sign(g);
        const nc = mod(K + s), r = Math.floor(heroY + 0.02);
        let climbable = solid(nc, r) && !solid(nc, r + 1) && !solid(col(), r + 1) && !spikes.has(Kk(nc, r + 1));
        if(!climbable){
          for(const Mc of MONSTERS){
            const body = Mc.state === 'frozen' || (Mc.type === 'mount' && Mc.phase !== 'frown');
            if(body && Mc.row === r && Math.abs(((nc - Mc.c + N/2)%N+N)%N - N/2) < 0.6 && !solid(nc, r + 1) && !solid(col(), r + 1)){ climbable = true; break; }
          }
        }
        const wallF = s > 0 ? 'L' : 'R';                  // the face of nc that points back at the hero
        if(!climbable && faced(nc, r, wallF) && solid(nc, r) && clGuard <= 0){
          if(climbDir !== s){ climbDir = s; climbHold = 0; }
          climbHold += dt;
          if(climbHold >= 0.1){
            clAttach(nc, r, wallF, -s); climbHold = 0;   // -s: keep holding the grab key => climb UP
            showMsg("the wall holds.");
          }
        } else if(climbable){
          if(climbDir !== s){ climbDir = s; climbHold = 0; }
          climbHold += dt;
          if(climbHold >= 0.12){
            const oc = mod(K), tc = mod(K + s);
            K += s; heroY = r + 1; vy = 0;
            rotLagInit = rot + angOf(K); rotLag = rotLagInit;  // world recenters on the vault's curve
            rot = -angOf(K); rotTarget = rot;
            climbA = CLIMB_DUR;
            climbPivot = [(P[oc][0] + P[tc][0]) / 2 - 2.5, r + 1, (P[oc][1] + P[tc][1]) / 2 - 2.5];
            climbFrom = [P[oc][0] - 2.5, r + 0.5, P[oc][1] - 2.5];
            climbAxis = new THREE.Vector3(0, 1, 0).cross(new THREE.Vector3(P[tc][0] - P[oc][0], 0, P[tc][1] - P[oc][1])).normalize();
            tip = 0; climbHold = 0;
            if(!climbedOnce){ climbedOnce = true; showMsg("a single block. you step up."); }
          }
        } else climbHold = 0;
      } else climbHold = 0;
    }
  }
  if(mode === 'cling'){
    let [bc, br] = clCell;
    if(!solid(bc, br) || !faced(bc, br, clFace)){ clDetach('peel'); }       // the block or its painted face is gone
    else if(climbA <= 0){                                                    // (while a face-change snap plays, it owns the hero)
      if(keys[' '] || keys['arrowup'] || keys['w']){ clDetach('jump'); }     // jump off the surface
      else if(clTang(clFace)){
        // ===== walk along a surface (B ceiling / O outer / I inner): the chase slides K, like a floor — just inverted =====
        const F = clFace, bodyR = (F === 'B') ? br - 1 : br;       // ceiling hangs below; outer/inner sit beside the block's own row
        heroY = bodyR; clT = K;
        if(spikes.has(Kk(col(), bodyR))){ die("the spikes."); }
        else {
          const hH = angOf(K) - midOf(K - 1), hH2 = midOf(K) - angOf(K);
          const daH = (-rot) - angOf(K);
          const gH = daH >= 0 ? Math.min(0.5, daH / (2 * hH2)) : Math.max(-0.5, daH / (2 * hH));
          if(Math.abs(gH) > 0.04) clFacing = Math.sign(gH);
          if(faced(col(), br, F) && solid(col(), br)){ clCell = [col(), br]; }   // walked onto the next block, same surface
          else {
            // ran off the end — round the corner onto a connected face (with rotation), else drop
            const s = clFacing, prev = mod(col() - s), cur = col();
            if(faced(prev, br, s > 0 ? 'R' : 'L')){                          // convex: fold onto the last block's side wall
              const F2 = s > 0 ? 'R' : 'L'; clCell = [prev, br]; clFace = F2; clT = heroY; clSign = s; clFacing = s;
              clSnap(prev, clHeroCol(prev, F2), br, heroY + 0.5); showMsg("around the corner.");
            } else if(solid(cur, br) && faced(cur, br, s > 0 ? 'L' : 'R')){    // concave: surface meets a wall going up
              const F2 = s > 0 ? 'L' : 'R'; clCell = [cur, br]; clFace = F2; clT = heroY; clSign = -s; clFacing = -s;
              let d = ((clHeroCol(cur, F2) - col()) % N + N) % N; if(d > N / 2) d -= N; K += d;
              clSnap(cur, clHeroCol(cur, F2), br, heroY + 0.5); showMsg("up the wall.");
            } else if(F === 'B' && faced(prev, br, 'O')){                      // ceiling -> outer face, around a convex tower corner
              clCell = [prev, br]; clFace = 'O'; clT = heroY; clSign = s; clFacing = s;
              clSnap(prev, clHeroCol(prev, 'O'), br, heroY + 0.5); showMsg("out onto the face.");
            } else { clDetach('slip'); }
          }
        }
      } else {
        // ===== climb a wall (L/R): the push drives the climb; at the top the surface wraps onto a ceiling, else vaults =====
        const steer = rotTarget - rot;
        let dir = 0;
        if(Math.abs(steer) > 1e-3) dir = (Math.sign(steer) === clSign) ? 1 : -1;
        rotTarget = rot;                                  // consume the push as climb, not rotation
        if(dir !== 0){ clT += dir * CLING_SPD * dt; clFacing = dir; }
        heroY = clT;
        const hc = col(), feet = Math.floor(heroY + 0.02), headR = Math.floor(heroY + 0.92);
        if(spikes.has(Kk(hc, feet))){ die("the spikes."); }
        else if(headR > br && faced(hc, headR, 'B') && solid(hc, headR)){                    // head reaches a sticky ceiling -> wrap UNDER it (climb-up flows into a crawl, like turning a corner)
          clCell = [hc, headR]; clFace = 'B'; heroY = clT = headR - 1; clSnap(bc, hc, headR, br + 0.5); showMsg("under the ledge.");
        }
        else if(feet > br){
          if(faced(bc, br + 1, clFace) && solid(bc, br + 1)){ clCell = [bc, br + 1]; }       // continue up the same wall
          else if(!solid(bc, br + 1) && !solid(hc, br + 1)){                                 // vault over the lip onto the top
            let d = ((bc - hc) % N + N) % N; if(d > N / 2) d -= N; K += d;
            heroY = br + 1; clT = heroY; vy = 0; mode = 'ground';
            clSnap(hc, bc, br + 1, br + 0.5); clCell = null; clFace = null; showMsg("over the lip.");
          } else { clT = Math.min(clT, br + 0.97); heroY = clT; }                            // capped: hold at the lip
        }
        else if(feet < br){
          if(faced(bc, br - 1, clFace) && solid(bc, br - 1)){ clCell = [bc, br - 1]; }       // continue down the same wall
          else { clDetach('slip'); }                                                          // off the bottom -> air
        }
      }
    }
  }
  if(mode === 'cling'){                              // a monster sharing the hero's cell is lethal while clung too (ground/air checks don't run here)
    for(const M of MONSTERS){
      if(M.state !== 'alive' || (M.type === 'mount' && M.phase !== 'frown')) continue;
      const dM = Math.abs(((col() - M.c + N / 2) % N + N) % N - N / 2);
      if(dM < 0.7 && spawnGuard <= 0 && rows().includes(M.row)){ die("the tenant."); break; }
    }
  }
  if(mode === 'air'){
    vy = Math.min(14, vy + 26 * dt);
    let ny = heroY - vy * dt;
    if(vy < 0){
      const head = Math.floor(ny + 0.999);
      const prevHead = Math.floor(heroY + 0.999);
      if(cspikes.has(Kk(col(), head)) && head !== prevHead){ die("the ceiling spikes."); ny = head; }   // rose into down-pointing spikes
      else if(solid(col(), head)){
        if(faced(col(), head, 'B') && head !== prevHead && clGuard <= 0){ heroY = head - 1; clAttach(col(), head, 'B', Math.sign(rotVel) || 1); ny = head - 1; squash = 0.14; showMsg("stuck. the ceiling holds you."); }
        else { ny = head - 1; vy = 0.5; }
      }
    } else {
      const r0 = Math.floor(ny + 0.02);
      for(const M of MONSTERS){
        if(M.state !== 'alive') continue;
        const d = Math.abs(((col() - M.c + N / 2) % N + N) % N - N / 2);
        if(d < 0.6 && ny <= M.row + 1.08 && ny > M.row + 0.25 && vy > 2){
          if(M.type === 'spiky'){ heroY = M.row + 1; die("its top is teeth too."); break; }
          if(M.type === 'mount'){
            if(M.phase === 'frown'){ heroY = M.row + 1; die("it stopped smiling."); break; }
            ny = M.row + 1; vy = 0; mode = 'ground'; squash = 0.16; airCarry = 0;
            if(M.rideT === 0) showMsg("it doesn't mind. for now.");
            continue;
          }
          M.state = 'frozen'; M.c = mod(Math.round(M.c)); M.thawT = 6;
          const under = Kk(M.c, M.row - 1);
          if(crackedSet.has(under)){
            crackedSet.delete(under); solidSet.delete(under); removeCell(under);
            const inBand = rr => BANDS.some(B => rr >= B.r0 && rr <= B.r1);
            let rr = M.row - 1;
            while(rr > 1 && (inBand(rr) || inBand(rr - 1) || !solid(M.c, rr - 1))) rr--;
            M.row = rr;
            solidSet.add(Kk(M.c, M.row));
            vy *= 0.6; squash = 0.1;
            showMsg("it goes straight through. follow it.");
          } else {
            solidSet.add(Kk(M.c, M.row));
            ny = M.row + 1; vy = 0; mode = 'ground'; squash = 0.2; airCarry = 0;
            showMsg("frozen stiff. briefly.");
          }
        }
      }
      if(mode === 'air'){
        const ck = Kk(col(), r0);
        if(spikes.has(Kk(col(), r0 + 1)) && ny <= r0 + 1.05){
          die("the spikes."); heroY = r0 + 1;
        } else if(crackedSet.has(ck) && vy >= CRACK_V){
          crackedSet.delete(ck); solidSet.delete(ck); removeCell(ck);
          vy *= 0.6; squash = 0.1;
          showMsg("it gives way.");
        } else if(solid(col(), r0)){
          ny = r0 + 1; vy = 0; mode = 'ground'; squash = 0.18; airCarry = 0;
          if(crackedSet.has(ck)){ showMsg("it creaks. heavier."); }
          if(pads.has(Kk(col(), r0))){ vy = -14; mode = 'air'; squash = 0; showMsg("sproing."); }
        }
      }
    }
    heroY = ny;
    // roll / fall into a sticky side wall -> cling on contact, if you're pushing toward it.
    // forgiving vertical window: grab at ANY row the hero's body overlaps (was a single row -> felt like a tiny sweet spot)
    if(mode === 'air' && clGuard <= 0){
      for(const s of [1, -1]){
        if(!(s > 0 ? (keys['arrowright'] || keys['d']) : (keys['arrowleft'] || keys['a']))) continue;
        const nc = mod(col() + s), F = s > 0 ? 'L' : 'R';
        for(const rc of [Math.floor(heroY + 0.02), Math.floor(heroY + 0.5), Math.floor(heroY + 0.95)]){
          if(solid(nc, rc) && faced(nc, rc, F) && !solid(col(), rc)){ clAttach(nc, rc, F, -s); break; }   // -s: keep pushing into the wall => climb UP
        }
        if(mode === 'cling') break;
      }
    }
  }
  if(mode !== 'dead') collectAt();
  if(squash > 0) squash = Math.max(0, squash - dt * 1.1);

  if(mode !== 'dead'){
    const ri = CUSTOM ? customBand(heroY) : roomIndex(heroY);
    if(ri > currentRoom){ currentRoom = ri; bankCoins = coinCount; if(!CUSTOM) showMsg(ROOM_NAMES[ri] + "."); }
  }
  if(heroY <= (CUSTOM ? CUSTOM.winY : 12.06) && respawnT === 0){ respawnT = 1.2; wonRun = true; showMsg(CUSTOM ? "you reached the bottom." : "the bottom. for now."); }
  if(respawnT > 0){
    respawnT -= dt;
    if(respawnT <= 0){ respawnT = 0; if(wonRun) resetRun("again, from the top."); else resetRoom(); }
  }

  rotVel = rotVel * 0.7 + ((rot - prevRot) / Math.max(dt, 1e-4)) * 0.3;
  prevRot = rot;

  // render
  tower.rotation.y = rot + rotLag;
  for(const b of bandCubes){
    const di = b.c + b.B.off, [x1, z1] = P[mod(di)], [x0, z0] = P[mod(di - b.B.dir)];
    const e = b.B.anim > 0 ? 1 - (b.B.anim / b.B.stepDur) : 1;
    const ee = e < 0.5 ? 2 * e * e : 1 - Math.pow(-2 * e + 2, 2) / 2;
    b.m.position.set((x0 + (x1 - x0) * ee) - 2.5, b.r + 0.5, (z0 + (z1 - z0) * ee) - 2.5);
  }
  for(const cm of coinMeshes) cm.m.rotation.y += dt * 2.2;
  for(const km of keyMeshes) km.m.rotation.y += dt * 1.6;
  const sR = Math.sin(rot + rotLag), cR = Math.cos(rot + rotLag);
  for(const dd of depthReg){
    if(!dd.mesh.parent) continue;
    const z2 = -dd.mesh.position.x * sR + dd.mesh.position.z * cR;
    let b = Math.floor((3.6 - z2) / 1.45);
    b = Math.max(0, Math.min(DEPTH_BANDS - 1, b));
    if(b !== dd.lastBand){
      dd.lastBand = b;
      for(const e of dd.entries){
        e.mt.color.copy(e.graded[b]);
        if(e.mt.transparent) e.mt.opacity = e.baseOp * (1 - b * 0.17);
      }
    }
  }

  const glow = keyCount > 0 ? 0.35 + 0.25 * Math.sin(now * 0.006) : 0;
  for(const D of doorMeshes) D.m.material.emissive.setRGB(glow * 0.9, glow * 0.7, glow * 0.15);
  for(const M of MONSTERS){
    const i0 = Math.floor(M.c), f = M.c - i0;
    const p0 = P[mod(i0)], p1 = P[mod(i0 + 1)];
    const bob = M.state === 'alive' ? Math.sin(now * 0.004) * 0.05 : 0;
    M.grp.position.set(p0[0] + (p1[0] - p0[0]) * f - 2.5, M.row + 0.5 + bob, p0[1] + (p1[1] - p0[1]) * f - 2.5);
    if(M.state === 'frozen'){
      M.bodyMat.color.setHex(0x9fd8ef);
      const p2 = M.thawT < 1.6 ? 1 + Math.sin(now * 0.02) * 0.06 : 1;
      M.grp.scale.set(p2, 1, p2);
    } else {
      if(M.type === 'mount' && M.phase === 'frown'){
        const t = Math.max(0, Math.min(1, M.rideT - 2));
        const freq = 6 + t * 22;
        const blink = 0.5 + 0.5 * Math.sin(M.rideT * freq);
        const c = new THREE.Color(0xff2a2a).lerp(new THREE.Color(0xffffff), blink * (0.4 + 0.6 * t));
        M.bodyMat.color.copy(c);
        M.grp.scale.setScalar(1 + 0.08 * t * blink);
      } else {
        M.bodyMat.color.setHex(M.type === 'spiky' ? 0xc0455a :
          M.type === 'mount' ? (M.phase === 'neutral' ? 0xd4b75f : 0x4fae6f) : 0x8f5fd4);
        M.grp.scale.setScalar(1);
      }
      M.grp.scale.set(1, 1, 1);
    }
  }

  if(climbA > 0){
    climbA = Math.max(0, climbA - dt);
    const e2 = 1 - climbA / CLIMB_DUR;
    const ee2 = e2 < 0.5 ? 2 * e2 * e2 : 1 - Math.pow(-2 * e2 + 2, 2) / 2;
    const qv = new THREE.Quaternion().setFromAxisAngle(climbAxis, ee2 * Math.PI);
    const vv = new THREE.Vector3(climbFrom[0] - climbPivot[0], climbFrom[1] - climbPivot[1], climbFrom[2] - climbPivot[2]).applyQuaternion(qv);
    hero.position.set(climbPivot[0] + vv.x, climbPivot[1] + vv.y, climbPivot[2] + vv.z);
    hero.quaternion.copy(qv);
    hero.scale.set(0.92, 0.92, 0.92);
    rotLag = rotLagInit * (1 - ee2);
    if(climbA === 0){ squash = 0.14; rotLag = 0; }
  } else if(mode === 'cling'){
    rotLag *= Math.pow(1e-4, dt / 0.32); if(Math.abs(rotLag) < 1e-4) rotLag = 0;
    const cc = clCell || [col(), Math.floor(heroY)];
    const bc = cc[0], br = cc[1];
    const n = faceDirG(bc, clFace);
    const bx = P[bc][0] - 2.5, bz = P[bc][1] - 2.5;
    if(clFace === 'B'){
      hero.position.set(bx, (br + 0.5) - 1.0 + squash * 0.4, bz);                       // hang under the block
    } else {
      hero.position.set(bx + n[0] * 0.96, heroY + 0.5 - squash * 0.4, bz + n[2] * 0.96);  // rest against the vertical face
    }
    hero.quaternion.identity();
    hero.scale.set(0.92 + squash * 0.5, 0.92 - squash * 0.8, 0.92 + squash * 0.5);
  } else {
  rotLag *= Math.pow(1e-4, dt / 0.32); if(Math.abs(rotLag) < 1e-4) rotLag = 0;
  const hL2 = angOf(K) - midOf(K - 1), hR2 = midOf(K) - angOf(K);
  const erot = rot + rotLag;            // the angle actually shown this frame
  const da2 = (-erot) - angOf(K);
  const g2 = (carryT > 0 || carrier) ? 0 : (da2 >= 0 ? Math.min(0.5, da2 / (2 * hR2)) : Math.max(-0.5, da2 / (2 * hL2)));
  const sgn = g2 >= 0 ? 1 : -1;
  const c0 = (carrier && rideFrac !== null) ? Pat(rideFrac) : P[col()], c1 = P[mod(K + sgn)];
  const d3 = new THREE.Vector3(c1[0] - c0[0], 0, c1[1] - c0[1]);
  const up3 = new THREE.Vector3(0, 1, 0);
  const hang = mode === 'hang';
  const axis = hang ? d3.clone().cross(up3).normalize() : up3.clone().cross(d3).normalize();
  const phi = Math.abs(g2) * Math.PI / 2;
  const q = new THREE.Quaternion().setFromAxisAngle(axis, phi);
  if(yLag < 0) yLag = Math.min(0, yLag + dt / 0.16);
  const pvY = hang ? Math.floor(heroY) + 1 : heroY + yLag;
  const pivot = new THREE.Vector3(c0[0] - 2.5, pvY, c0[1] - 2.5).add(d3.clone().multiplyScalar(0.5));
  const off = d3.clone().multiplyScalar(-0.5).add(up3.clone().multiplyScalar(hang ? -0.5 : 0.5)).applyQuaternion(q);
  hero.position.copy(pivot.add(off));
  hero.position.y += hang ? squash * 0.4 : -squash * 0.4;
  hero.quaternion.copy(q);
  hero.scale.set(0.92 + squash * 0.5, 0.92 - squash * 0.8, 0.92 + squash * 0.5);
  }
  hero.visible = mode !== 'dead';

  const leadT = (mode === 'air' && vy > 2) ? Math.min(3.5, vy * 0.3) : 0;
  camLead += (leadT - camLead) * Math.min(1, dt * 5);
  const onO = (mode === 'cling' && clFace === 'O');
  clCamPull += ((onO ? 1 : 0) - clCamPull) * Math.min(1, dt * 3);             // smooth ease in/out on outer faces
  const camZ = 13 + clCamPull * 3.4;                                          // pull back to reveal the tower's exterior
  const camY = camera.position.y || heroY + 4;
  camera.position.set(0, camY + (heroY + 4.2 + clCamPull * 2.2 - camLead - camY) * Math.min(1, dt * 4), camZ);
  camera.lookAt(0, heroY + 1.1 - camLead - clCamPull * 1.3, 0);              // tilt the gaze down a touch
  if(msgT > 0){ msgT -= dt; if(msgT <= 0) msgEl.textContent = ''; }
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
const CATCH_STONES = [];
CUSTOM = loadCustom();
resetRun(CUSTOM ? "your level — get to the bottom." : "six rooms between you and the bottom.");
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();
requestAnimationFrame(frame);
</script>

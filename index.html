<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>square playground v5 — no way to get stuck</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#10141d;font-family:ui-monospace,Menlo,Consolas,monospace;touch-action:none;overscroll-behavior:none;}
  *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;}
  #msg{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);color:#cfe0ff;font-size:14px;opacity:.85;text-align:center;pointer-events:none;}
  #hint{position:fixed;left:50%;top:18px;transform:translateX(-50%);color:#6b7a99;font-size:12px;pointer-events:none;}
  #coins{position:fixed;top:14px;right:14px;color:#ffd34d;font-size:14px;background:#1f2940aa;border:1px solid #3a4a6a;border-radius:9px;padding:7px 12px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">sand crumbles behind you. the far side fades. spikes mean it now.</div>
<div id="msg"></div>
<div id="coins">&#9670; 0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// playground v3: the press is parked. the puzzle layer arrives —
// sand floors that crumble once crossed, a key found early for a chest
// found late, wall mazes on every ring, two counter-rotating bands,
// pads that now fire when rolled onto (the v2 bug), and more spikes.
// ---------------------------------------------------------------------------
const N = 20, H = 64;
const P = [];
for(let x = 0; x < 5; x++) P.push([x, 5]);
for(let z = 5; z > 0; z--) P.push([5, z]);
for(let x = 5; x > 0; x--) P.push([x, 0]);
for(let z = 0; z < 5; z++) P.push([0, z]);
const ANGraw = P.map(([x, z]) => Math.atan2(x - 2.5, z - 2.5));
const ANG = []; let acc0 = ANGraw[0];
for(let i = 0; i < N; i++){
  if(i > 0){ let d = ANGraw[i] - ANGraw[i - 1]; while(d <= 0) d += Math.PI * 2; acc0 += d; }
  ANG.push(acc0);
}
const TWO = Math.PI * 2;
const angOf = K => ANG[((K % N) + N) % N] + TWO * Math.floor(K / N);
const midOf = K => (angOf(K) + angOf(K + 1)) / 2;
const mod = c => ((c % N) + N) % N;
const Kk = (c, r) => mod(c) + ',' + r;

// --- scene scaffolding ---
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x10141d);
scene.fog = new THREE.Fog(0x10141d, 9, 30);
const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x2a2418, 0.95));
const sun = new THREE.DirectionalLight(0xffe8c0, 0.7); sun.position.set(3, 8, 6); scene.add(sun);
const tower = new THREE.Group(); scene.add(tower);
const box = new THREE.BoxGeometry(1, 1, 1);
const plate = new THREE.BoxGeometry(0.98, 0.07, 0.98);
const edgeGeo = new THREE.EdgesGeometry(box);
const palette = [0x33415e, 0x3a4a6a, 0x2c3852];
function edgeLine(c){ return new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.5 })); }

// quantized depth grading: five bands, block by block, desaturated and sunk
// toward the dark the further around the tower a cube sits. recomputed from
// the rotated depth, so the far side is always the muted side.
const BG = new THREE.Color(0x10141d);
const DEPTH_BANDS = 5;
function gradeColor(base, b){
  const t = b / (DEPTH_BANDS - 1);
  const c = base.clone();
  const l = c.r * 0.299 + c.g * 0.587 + c.b * 0.114;
  c.lerp(new THREE.Color(l, l, l), t * 0.55);
  c.lerp(BG, t * 0.45);
  return c;
}
let depthReg = [];
function regDepth(mesh, materials){
  const entries = materials.map(mt => ({ mt, graded: Array.from({ length: DEPTH_BANDS }, (_, b) => gradeColor(mt.color.clone(), b)), baseOp: mt.opacity }));
  depthReg.push({ mesh, entries, lastBand: -1 });
}
const hero = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xd9a13a }));
hero.scale.set(0.92, 0.92, 0.92);
hero.add(edgeLine(0xffe8b0));
tower.add(hero);

// --- world ---
let solidSet, pads, sticky, sandSet, sandTimers, spikes, coinsSet, keySet, chestSet, BANDS;
let cubeList, coinMeshes, keyMeshes, bandCubes, spikeMeshes, sandMeshes, chestMeshes;
function solid(c, r){
  if(r < 0) return true;
  for(const B of BANDS) if(r >= B.r0 && r <= B.r1) return B.set.has(Kk(c - B.off, r));
  return solidSet.has(Kk(c, r)) || chestSet.has(Kk(c, r));
}
function clearGroup(){
  for(let i = tower.children.length - 1; i >= 0; i--){ const ch = tower.children[i]; if(ch !== hero) tower.remove(ch); }
}
function buildWorld(){
  solidSet = new Set(); pads = new Set(); sticky = new Set(); sandSet = new Set();
  sandTimers = new Map(); spikes = new Set(); coinsSet = new Set(); keySet = new Set(); chestSet = new Set();
  BANDS = [
    { r0: 39, r1: 41, off: 0, t: 0, period: 1.6, stepDur: 0.32, anim: 0, dir: 1,  set: new Set() },
    { r0: 19, r1: 20, off: 0, t: 0, period: 2.1, stepDur: 0.32, anim: 0, dir: -1, set: new Set() }
  ];
  const fill = (c, r) => solidSet.add(Kk(c, r));
  const wall = (c, r, h2) => { for(let i = 0; i < h2; i++) fill(c, r + i); };
  const sand = (c, r) => { fill(c, r); sandSet.add(Kk(c, r)); };

  for(let c = 0; c < N; c++){ fill(c, 0); fill(c, 1); }
  // L6 (7): holes 3,12 + walls
  for(let c = 0; c < N; c++) if(c !== 3 && c !== 12) fill(c, 7);
  wall(7, 8, 2); wall(16, 8, 2);
  // L5 (12): holes 9,16 + walls
  for(let c = 0; c < N; c++) if(c !== 9 && c !== 16) fill(c, 12);
  wall(2, 13, 2); wall(12, 13, 2);
  // band B floor zone: rows 19..20 counter-rotating
  for(let c = 0; c < N; c++) if(c % 5 !== 1) BANDS[1].set.add(Kk(c, 19));
  BANDS[1].set.add(Kk(10, 20));
  // L4 (24): holes 0,13 + walls; spikes guard a corridor
  for(let c = 0; c < N; c++) if(c !== 0 && c !== 13 && c !== 6) fill(c, 24);
  wall(5, 25, 2); wall(17, 25, 2);
  spikes.add(Kk(9, 25)); spikes.add(Kk(10, 25));
  // L3 (29): sand crossing east to a dead-end coin
  for(let c = 2; c <= 9; c++) fill(c, 29);
  sand(10, 29); sand(11, 29); sand(12, 29); sand(13, 29);
  fill(14, 29); wall(15, 30, 2);
  coinsSet.add(Kk(14, 30));
  pads.add(Kk(2, 29));
  // L2.5 (34): holes 4,8; chest in a walled pocket
  for(let c = 0; c < N; c++) if(c !== 4 && c !== 8 && c !== 13) fill(c, 34);
  wall(10, 35, 2); wall(15, 35, 2);
  chestSet.add(Kk(12, 35));
  wall(0, 35, 2);
  // band A: rows 39..41
  for(let c = 0; c < N; c++) if(c % 7 !== 2) BANDS[0].set.add(Kk(c, 39));
  BANDS[0].set.add(Kk(4, 40)); BANDS[0].set.add(Kk(4, 41)); BANDS[0].set.add(Kk(13, 40));
  // L2 (45): spike ring, holes 2,19, walls
  for(let c = 0; c < N; c++) if(c !== 2 && c !== 19) fill(c, 45);
  spikes.add(Kk(8, 46)); spikes.add(Kk(9, 46)); spikes.add(Kk(14, 46));
  wall(4, 46, 2); wall(11, 46, 2);
  coinsSet.add(Kk(2, 38));
  // L1.5 (49): catch shelf with the KEY at its far end
  for(let c = 14; c <= 19; c++) fill(c, 49);
  keySet.add(Kk(19, 50));
  coinsSet.add(Kk(17, 54));
  // L1 (53): runway, wall forcing east, pad to the sticky slab
  for(let c = 3; c <= 13; c++) fill(c, 53);
  wall(5, 54, 2);
  pads.add(Kk(12, 53));
  for(let c = 12; c <= 16; c++){ fill(c, 57); sticky.add(Kk(c, 57)); }
  // spawn deck
  for(let c = 0; c < N; c++) if(c !== 6 && c !== 7) fill(c, 58);
  coinsSet.add(Kk(6, 56));
  // catch stones: audit-generated (baked below by the build script)
  for(const [c, r] of CATCH_STONES) fill(c, r);
  // arc exits: every walled arc gets a punched down-exit (escapability audit)
  for(const [c, r] of [[18, 34], [6, 45], [10, 45], [13, 45]]) solidSet.delete(Kk(c, r));

  // meshes
  clearGroup(); tower.add(hero); depthReg = [];
  cubeList = []; coinMeshes = []; keyMeshes = []; bandCubes = []; spikeMeshes = []; sandMeshes = []; chestMeshes = [];
  for(const key of solidSet){
    const [c, r] = key.split(',').map(Number);
    const isSand = sandSet.has(key);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: isSand ? 0xb89a5e : palette[(c + r) % 3] }));
    m.position.set(P[c][0] - 2.5, r + 0.5, P[c][1] - 2.5);
    const el = edgeLine(isSand ? 0xe0c890 : 0x55688f); m.add(el);
    const mats = [m.material, el.material];
    if(pads.has(key)){ const p = new THREE.Mesh(plate, new THREE.MeshLambertMaterial({ color: 0xffd34d })); p.position.y = 0.5; m.add(p); mats.push(p.material); }
    if(sticky.has(key)){ const p = new THREE.Mesh(plate, new THREE.MeshLambertMaterial({ color: 0x6ee37a })); p.position.y = -0.5; m.add(p); mats.push(p.material); }
    tower.add(m); regDepth(m, mats);
    if(isSand) sandMeshes.push({ key, m }); else cubeList.push({ key, m });
  }
  for(const key of chestSet){
    const [c, r] = key.split(',').map(Number);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0x8a5a33 }));
    m.position.set(P[c][0] - 2.5, r + 0.5, P[c][1] - 2.5);
    const lid = new THREE.Mesh(plate, new THREE.MeshLambertMaterial({ color: 0xd9a13a }));
    lid.position.y = 0.28; m.add(lid);
    const el = edgeLine(0xd9a13a); m.add(el);
    tower.add(m); regDepth(m, [m.material, lid.material, el.material]);
    chestMeshes.push({ key, m });
  }
  for(const B of BANDS) for(const key of B.set){
    const [c, r] = key.split(',').map(Number);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0x4a5a85 }));
    const el = edgeLine(0x7a8fc0); m.add(el); tower.add(m);
    regDepth(m, [m.material, el.material]);
    bandCubes.push({ B, c, r, m });
  }
  for(const key of coinsSet){
    const [c, r] = key.split(',').map(Number);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xffd34d }));
    m.scale.set(0.3, 0.3, 0.3); m.rotation.z = Math.PI / 4;
    m.position.set(P[c][0] - 2.5, r + 0.5, P[c][1] - 2.5);
    const el = edgeLine(0xfff2b0); m.add(el); tower.add(m);
    regDepth(m, [m.material, el.material]);
    coinMeshes.push({ key, m });
  }
  for(const key of keySet){
    const [c, r] = key.split(',').map(Number);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xe8c44a }));
    m.scale.set(0.5, 0.18, 0.18);
    m.position.set(P[c][0] - 2.5, r + 0.45, P[c][1] - 2.5);
    const el = edgeLine(0xfff2b0); m.add(el); tower.add(m);
    regDepth(m, [m.material, el.material]);
    keyMeshes.push({ key, m });
  }
  for(const key of spikes){
    const [c, r] = key.split(',').map(Number);
    const m = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xc0455a }));
    m.scale.set(0.55, 0.42, 0.55); m.rotation.y = Math.PI / 4; m.rotation.x = Math.PI / 4;
    m.position.set(P[c][0] - 2.5, r + 0.28, P[c][1] - 2.5);
    tower.add(m); regDepth(m, [m.material]);
    spikeMeshes.push({ key, m });
  }
}

// --- run state ---
let rot = 0, omega = 0, K = 2, heroY = 59, vy = 0, mode = 'ground', squash = 0, respawnT = 0, tip = 0, coinCount = 0, camLead = 0, hasKey = false, lockMsgCd = 0;
const TOPPLE_A = 5.5, LEAN = 0.04;
const msgEl = document.getElementById('msg'), coinEl = document.getElementById('coins');
let msgT = 0;
function showMsg(t){ msgEl.textContent = t; msgT = 2.2; }
function hud(){ coinEl.innerHTML = '&#9670; ' + coinCount + (hasKey ? ' &nbsp;&#128273;' : ''); }
function die(what){
  if(mode === 'dead') return;
  mode = 'dead'; respawnT = 1.3;
  showMsg(what + " again, from the top.");
}
function resetRun(msg){
  buildWorld();
  heroY = 59; vy = 0; mode = 'ground'; coinCount = 0; camLead = 0; hasKey = false;
  hud();
  let bk = K; for(let g = 0; g < N; g++){ const a = -rot; if(a >= midOf(bk)) bk++; else if(a < midOf(bk - 1)) bk--; else break; }
  K = bk;
  showMsg(msg);
}

const col = () => mod(K);
const rows = () => { const a = Math.floor(heroY + 0.02), b = Math.floor(heroY + 0.95); return a === b ? [a] : [a, b]; };
function canEnter(k2){ const c = mod(k2); return rows().every(r => !solid(c, r)); }
function setRot(target){
  for(let guard = 0; guard < N * 2; guard++){
    const a = -target;
    if(a >= midOf(K) && canEnter(K + 1)){ K += 1; continue; }
    if(a < midOf(K - 1) && canEnter(K - 1)){ K -= 1; continue; }
    const hR = midOf(K) - angOf(K), hL = angOf(K) - midOf(K - 1);
    let hi = midOf(K) - 1e-6, lo = midOf(K - 1);
    if(!canEnter(K + 1)) hi = angOf(K) + 2 * hR * LEAN;
    if(!canEnter(K - 1)) lo = angOf(K) - 2 * hL * LEAN;
    const ca = Math.min(hi, Math.max(lo, a));
    if(ca !== a){ rot = -ca; omega = 0; return; }
    rot = target; return;
  }
  rot = target;
}

// --- input ---
let ptr = null, lastX = 0, lastT = 0, dragVel = 0, lastDrag = -1e9;
const SENS = 0.0095;
canvas.addEventListener('pointerdown', e => { e.preventDefault(); ptr = e.pointerId; lastX = e.clientX; lastT = performance.now(); dragVel = 0; omega = 0; });
canvas.addEventListener('pointermove', e => {
  if(e.pointerId !== ptr) return;
  const now = performance.now(), dx = e.clientX - lastX, dt = Math.max(8, now - lastT);
  if(Math.abs(dx) > 1.5) lastDrag = now;
  setRot(rot + dx * SENS);
  dragVel = (dx * SENS) / (dt / 1000);
  lastX = e.clientX; lastT = now;
});
function release(e){ if(e.pointerId === ptr){ ptr = null; omega = Math.max(-7, Math.min(7, dragVel)); } }
canvas.addEventListener('pointerup', release);
canvas.addEventListener('pointercancel', release);
addEventListener('contextmenu', e => e.preventDefault());
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function collectAt(){
  for(const r of rows()){
    const key = Kk(col(), r);
    if(coinsSet.has(key)){
      coinsSet.delete(key); coinCount++; hud();
      const i = coinMeshes.findIndex(c => c.key === key);
      if(i >= 0){ tower.remove(coinMeshes[i].m); coinMeshes.splice(i, 1); }
      showMsg("coin.");
    }
    if(keySet.has(key)){
      keySet.delete(key); hasKey = true; hud();
      const i = keyMeshes.findIndex(c => c.key === key);
      if(i >= 0){ tower.remove(keyMeshes[i].m); keyMeshes.splice(i, 1); }
      showMsg("a key. heavy, patient.");
    }
  }
}

// --- physics + render ---
let last = 0;
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000 || 0.016); last = now;

  const driving = keys['arrowleft'] || keys['a'] || keys['arrowright'] || keys['d'] || (ptr !== null && (now - lastDrag) < 110);
  if(keys['arrowleft'] || keys['a']) setRot(rot + 2.4 * dt);
  else if(keys['arrowright'] || keys['d']) setRot(rot - 2.4 * dt);
  else if(ptr === null && Math.abs(omega) > 0.02){ setRot(rot + omega * dt); omega *= Math.pow(0.08, dt); }
  if(!driving && Math.abs(omega) <= 0.6){
    omega = 0;
    const hL = angOf(K) - midOf(K - 1), hR = midOf(K) - angOf(K);
    const da = (-rot) - angOf(K);
    const g = da >= 0 ? Math.min(0.5, da / (2 * hR)) : Math.max(-0.5, da / (2 * hL));
    if(Math.abs(g) > 1e-4){
      const dir = -Math.sign(g);
      if(Math.sign(tip) !== dir) tip = 0;
      tip += dir * TOPPLE_A * (0.35 + (0.5 - Math.abs(g))) * dt;
      let ng = g + tip * dt;
      if(Math.sign(ng) !== Math.sign(g) || ng === 0){ ng = 0; tip = 0; squash = Math.max(squash, 0.12); }
      rot = -(angOf(K) + ng * (ng >= 0 ? 2 * hR : 2 * hL));
    } else tip = 0;
  } else tip = 0;

  // bands step on their own clocks, in their own directions
  for(const B of BANDS){
    B.t += dt;
    if(B.anim > 0) B.anim = Math.max(0, B.anim - dt);
    if(B.t >= B.period){
      B.t = 0; B.off += B.dir; B.anim = B.stepDur;
      for(let g = 0; g < 3; g++){
        if(mode !== 'dead' && rows().some(r => r >= B.r0 && r <= B.r1) && !canEnter(K)){ K += B.dir; rot = -angOf(K); }
        else break;
      }
    }
  }

  // sand crumbles once stood on
  if(sandTimers.size){
    for(const [key, t0] of [...sandTimers]){
      const t = t0 - dt;
      const sm = sandMeshes.find(x => x.key === key);
      if(t <= 0){
        sandTimers.delete(key); sandSet.delete(key); solidSet.delete(key);
        if(sm){ tower.remove(sm.m); }
      } else {
        sandTimers.set(key, t);
        if(sm && t < 0.22){ const s2 = Math.max(0.05, t / 0.22); sm.m.scale.set(s2, s2, s2); }
      }
    }
  }

  if(mode === 'ground'){
    const sup = Math.floor(heroY + 0.02) - 1;
    const supKey = Kk(col(), sup);
    if(pads.has(supKey)){ vy = -14; mode = 'air'; squash = 0; showMsg("sproing."); }
    else if(spikes.has(Kk(col(), sup + 1))){ die("the spikes."); }
    else if(!solid(col(), sup)){ mode = 'air'; vy = 0; }
    else if(sandSet.has(supKey) && !sandTimers.has(supKey)){ sandTimers.set(supKey, 0.45); showMsg("the sand gives."); }
    // the chest: push against it with the key
    if(mode === 'ground'){
      if(lockMsgCd > 0) lockMsgCd -= dt;
      const hL = angOf(K) - midOf(K - 1), hR = midOf(K) - angOf(K);
      const da = (-rot) - angOf(K);
      const g = da >= 0 ? Math.min(0.5, da / (2 * hR)) : Math.max(-0.5, da / (2 * hL));
      if(Math.abs(g) > 0.03){
        const s = Math.sign(g);
        const ck = Kk(K + s, Math.floor(heroY + 0.02));
        if(chestSet.has(ck)){
          if(hasKey){
            chestSet.delete(ck); hasKey = false; coinCount += 3; hud();
            const i = chestMeshes.findIndex(c => c.key === ck);
            if(i >= 0){ tower.remove(chestMeshes[i].m); chestMeshes.splice(i, 1); }
            showMsg("the chest opens. three coins.");
          } else if(lockMsgCd <= 0){ showMsg("locked. it wants a key."); lockMsgCd = 1.6; }
        }
      }
    }
  }
  if(mode === 'hang'){
    if(!sticky.has(Kk(col(), Math.floor(heroY) + 1))){ mode = 'air'; vy = 0; showMsg("the ceiling lets go."); }
  }
  if(mode === 'air'){
    vy = Math.min(14, vy + 26 * dt);
    let ny = heroY - vy * dt;
    if(vy < 0){
      const head = Math.floor(ny + 0.999);
      if(solid(col(), head)){
        if(sticky.has(Kk(col(), head))){ ny = head - 1; vy = 0; mode = 'hang'; squash = 0.14; showMsg("stuck. the ceiling holds you."); }
        else { ny = head - 1; vy = 0.5; }
      }
    } else {
      const r0 = Math.floor(ny + 0.02);
      if(spikes.has(Kk(col(), r0 + 1)) && ny <= r0 + 1.05){
        die("the spikes."); heroY = r0 + 1;
      } else if(solid(col(), r0)){
        ny = r0 + 1; vy = 0; mode = 'ground'; squash = 0.18;
        if(pads.has(Kk(col(), r0))){ vy = -14; mode = 'air'; squash = 0; showMsg("sproing."); }
      }
    }
    heroY = ny;
  }
  if(mode !== 'dead') collectAt();
  if(squash > 0) squash = Math.max(0, squash - dt * 1.1);

  if(heroY <= 2.05 && respawnT === 0){ respawnT = 1.2; showMsg("the bottom. for now."); }
  if(respawnT > 0){
    respawnT -= dt;
    if(respawnT <= 0){ respawnT = 0; resetRun("again, from the top."); }
  }

  // render
  tower.rotation.y = rot;
  for(const b of bandCubes){
    const di = b.c + b.B.off, [x1, z1] = P[mod(di)], [x0, z0] = P[mod(di - b.B.dir)];
    const e = b.B.anim > 0 ? 1 - (b.B.anim / b.B.stepDur) : 1;
    const ee = e < 0.5 ? 2 * e * e : 1 - Math.pow(-2 * e + 2, 2) / 2;
    b.m.position.set((x0 + (x1 - x0) * ee) - 2.5, b.r + 0.5, (z0 + (z1 - z0) * ee) - 2.5);
  }
  for(const cm of coinMeshes) cm.m.rotation.y += dt * 2.2;
  for(const km of keyMeshes) km.m.rotation.y += dt * 1.6;
  const sR = Math.sin(rot), cR = Math.cos(rot);
  for(const dd of depthReg){
    if(!dd.mesh.parent) continue;
    const z2 = -dd.mesh.position.x * sR + dd.mesh.position.z * cR;

  const leadT = (mode === 'air' && vy > 2) ? Math.min(3.5, vy * 0.3) : 0;

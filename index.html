##..##", ".#####", "..####"], ["##o##^", "#####^", "##..##", "^#..##", "######", "...###"], ["##.##.", "#####.", "##..##", ".#..##", "######", "#...##"], ["......", "J####.", ".#..#n", ".#..#u", "m####L", ".#...."], ["......", ".####.", ".#..##", ".#..#.", "#####.", "..#..."], ["#####.", ".####.", "##..##", ".#..##", "######", "...#.#"], ["######", ".#####", "##..##", "##..##", "######", "#...##"], ["######", ".####.", "L#..#.", "##..#.", "#####J", "##...."], ["#####.", ".####.", ".#..#.", "##..#.", "#####.", "###..."], ["####..", "#####.", "##..##", "##..##", "#####.", "####.#"], ["###...", "######", "##..##", "##..##", "#####.", "######"], [".....#", "J#####", ".#..##", "n#..#g", ".####.", "....##"], ["....##", ".#####", ".#..##", "##..#.", ".####.", ".....#"], ["##.###", ".#####", "##..##", "##..##", ".#####", "###..."], ["######", ".#####", "##..##", "##..##", ".####.", "####.."], ["o#####", ".#####", ".#..##", "o#..#.", ".####.", "#####."], [".#####", ".#####", ".#..#.", ".#..#.", ".####.", "######"], ["######", "#####.", "##..#.", "##..#.", "######", "######"], ["#####.", "#####.", "##..#.", "##..##", "######", "######"], ["####..", "#####.", "##..##", "##..##", "######", "######"], [".u....", "J#####", ".#..##", ".#..##", ".#####", "######"], [".....#", ".#####", ".#..##", ".#..##", ".#####", ".#####"], ["###.##", "o#####", "##..##", "##..##", ".#####", "..####"], ["K#####", ".#####", "r#..##", "##..##", "######", "...###"], [".#####", "^#####", ".#..##", "##..##", "######", "#...##"], ["######", "######", "##..##", "##..##", "######", "##...#"], ["#####^", "^####^", "^#..##", "##..##", "######", "###..."], ["#####c", ".####c", ".#..##", "##..##", "#####.", "####.."], ["....J.", ".####.", ".#..#.", "D#..#.", "m####.", ".####."], ["......", ".####.", ".#..#.", "##..#.", "#####.", "..####"], [".###.#", ".#####", ".#..##", "##..#.", "######", "...###"], [".###.#", "######", "##..##", "##..##", "######", "#..G##"], [".L.T.#", "######", "##..##", "##..##", "######", "##...#"], [".....#", "######", "##..##", "##..##", "######", "###..."], ["######", "######", "##..##", "##..##", "######", "####.."], ["######", "######", "##..##", "##..##", "######", "#####."], ["######", "######", "##..##", "##..##", "######", "######"], ["######", "######", "##..##", "##..##", "######", "######"], ["######", "######", "##..##", "##..##", "######", "######"], ["######", "######", "##..##", "##..##", "######", "######"]];
const BRIDGES = [{"lever": [5, 2, 11], "cells": [[3, 0, 7], [2, 0, 8]]}, {"lever": [3, 5, 52], "cells": [[5, 2, 55], [5, 1, 55], [5, 4, 55]]}, {"lever": [5, 4, 99], "cells": [[5, 1, 98], [5, 0, 98], [0, 3, 98], [2, 0, 98]], "levers2": [[0, 2, 103]]}, {"lever": [1, 0, 128], "cells": [[0, 1, 123], [0, 2, 123]]}];
const W = 6, ROWS = LAYERS.length, CX = W / 2;
const RINGS = [];
const GATES = [{"y": 20, "x": 2, "z": 0}, {"y": 49, "x": 2, "z": 5}, {"y": 68, "x": 2, "z": 0}, {"y": 107, "x": 5, "z": 3}];
const COINS = {"cells": [[5, 3, 9], [1, 5, 24], [4, 5, 24], [5, 5, 33], [2, 5, 73], [5, 5, 73], [5, 3, 82], [2, 0, 97], [0, 0, 111], [0, 3, 111], [0, 1, 118]], "quota": 7, "optional": [[1, 5, 24], [4, 5, 24], [2, 5, 73], [5, 5, 73], [0, 0, 111], [0, 3, 111]]};
const TELE = [{"src": [2, 5, 81], "dst": [5, 5, 82]}, {"src": [3, 0, 128], "dst": [2, 0, 128]}];
const PATROLS = [{"cells": [[2, 5, 62], [3, 5, 62], [4, 5, 62]], "step": 1.15}];
const FACE_NAMES = ["north","east","south","west"];
const RISE = 0.62;
const ROLL_T = 0.15, CLIMB_T = 0.26, HOP_T = 0.24, FALL_T = 0.085;

let vox, G, act, hasKey, frozen, snapVox = null, snapKey = false, snapOn = [], coins = 0, snapCoins = 0, crumbleSeen = false, patState = PATROLS.map(() => ({k: 0, dir: 1, t: 0})), boostT = 0, coolT = 0, flow = 0, camH, viewH = 2, grace, won, deaths = 0, dirty, rotating = null, carried = false, activeRing = null, gateIdx = 0, checkpoint = null;
let msgT = 0, lockMsgCd = 0, face = 0, lastDir = null, pcol = 0;
let airV = null, airLat = false, hangSteps = 0, airDrift = 0, paused = false, padFwd = null, padBack = null;
const PCOLS = [null, 0xe1493f, 0x3f7fe1];
function setPcol(c){
  if(pcol === c) return;
  pcol = c;
  body.material.forEach((mm, i) => mm.color.setHex(c ? PCOLS[c] : faceTints[i]));
  const sw = document.getElementById('swatch');
  sw.style.background = c ? '#' + PCOLS[c].toString(16).padStart(6, '0') : '#dfe6f0';
  if(c) showMsg(c === 1 ? "you are red now." : "you are blue now.");
}
const spawnCell = {x: 0, y: 2, z: 5};

function buildVox(){
  vox = LAYERS.map(layer => layer.map(s => s.split('')));
  for(const b of BRIDGES){ b.on = false; for(const c of (b.icells || [])) vox[c[2]][c[1]][c[0]] = '='; }
}
function snapshot(){ snapVox = vox.map(l => l.map(r => r.slice())); snapKey = hasKey; snapOn = BRIDGES.map(b => !!b.on); snapCoins = coins; }
function inB(x, z){ return x >= 0 && x < W && z >= 0 && z < W; }
function inCore(x, z){ return x >= 2 && x <= 3 && z >= 2 && z <= 3; }
function cellAt(x, y, z){
  if(!inB(x, z) || y < 0 || y >= ROWS + 6) return y < 0 ? '#' : '.';
  if(y >= 1 && inCore(x, z)) return '~';
  if(y >= ROWS) return '.';
  return vox[y][z][x];
}
function patAt(x, y, z){
  for(let i = 0; i < PATROLS.length; i++){
    const c = PATROLS[i].cells[patState[i].k];
    if(c[0] === x && c[1] === z && c[2] === y) return i;
  }
  return -1;
}
function isSolid(ch){ return ch === '#' || ch === '=' || ch === 'D' || ch === '~' || ch === 'E' || ch === 'R' || ch === 'U' || ch === 'm' || ch === 'n' || ch === 'c'; }
function free(x, y, z){ return inB(x, z) && !isSolid(cellAt(x, y, z)); }

function resetRun(full){
  buildVox();
  gateIdx = 0; checkpoint = {x: spawnCell.x, y: spawnCell.y, z: spawnCell.z};
  viewH = spawnCell.y;
  activeRing = null;
  G = {x: spawnCell.x, y: spawnCell.y, z: spawnCell.z};
  act = null; hasKey = false; frozen = 0; won = false; rotating = null; coins = 0; updateCoinHud();
  snapshot();
  camH = G.y - 4; grace = 0; face = 0; lastDir = null; airV = null; airLat = false;
  dirty = true;
  baseQ.set(0, 0, 0, 1);
  roller.quaternion.set(0, 0, 0, 1);
  player.position.copy(cellCenter(G.x, G.y, G.z));
  if(full) showMsg("the gauntlet. every block counts.");
}
function showMsg(t){ const m = document.getElementById('msg'); m.textContent = t; m.style.opacity = 1; msgT = 3.2; }
function die(reason){
  deaths++; document.getElementById('deaths').textContent = deaths;
  G = {x: checkpoint.x, y: checkpoint.y, z: checkpoint.z};
  act = null; rotating = null; activeRing = null; lastDir = null; airV = null; airLat = false;
  camH = G.y - 3; viewH = G.y; grace = 0;
  baseQ.set(0, 0, 0, 1); roller.quaternion.set(0, 0, 0, 1);
  player.position.copy(cellCenter(G.x, G.y, G.z));
  setPcol(0);
  vox = snapVox.map(l => l.map(r => r.slice())); BRIDGES.forEach((b, i) => { b.on = !!snapOn[i]; }); coins = snapCoins; updateCoinHud(); hasKey = snapKey; frozen = 0; dirty = true;
  showMsg(reason + " back to the last gate. the section resets.");
}

// ---------- discrete movement ----------
function startAct(type, tx, ty, tz, d){
  if(airV === null && type !== 'air' && (tx !== G.x || tz !== G.z || ty !== G.y) && cellAt(G.x, G.y - 1, G.z) === 'c'){
    vox[G.y - 1][G.z][G.x] = '.'; dirty = true;
    if(!crumbleSeen){ crumbleSeen = true; showMsg("it crumbles behind you."); }
  }
  act = {type, fx: G.x, fy: G.y, fz: G.z, tx, ty, tz, t: 0,
         dur: type === 'roll' ? ROLL_T : (type === 'climb' || type === 'down') ? CLIMB_T : type === 'hop' ? HOP_T : type === 'bounce' ? 0.18 : FALL_T,
         dx: d ? d.x : 0, dz: d ? d.z : 0};
}
function ringDir(x, z, fwd){
  x = Math.max(0, Math.min(5, x)); z = Math.max(0, Math.min(5, z));
  if(fwd){
    if(z === 5 && x < 5) return [1, 0];
    if(x === 5 && z > 0) return [0, -1];
    if(z === 0 && x > 0) return [-1, 0];
    return [0, 1];
  }
  if(z === 5 && x > 0) return [-1, 0];
  if(x === 5 && z < 5) return [0, 1];
  if(z === 0 && x < 5) return [1, 0];
  return [0, -1];
}
function inputDir(){
  if(keys['fwd'] || keys['back']){
    const d = ringDir(G.x, G.z, !!keys['fwd']);
    return {x: d[0], z: d[1]};
  }
  const lat = (keys['d'] || keys['arrowright']) ? 1 : (keys['a'] || keys['arrowleft']) ? -1 : 0;
  if(!lat) return null;
  const rv = [[1,0],[0,-1],[-1,0],[0,1]][face];
  return {x: lat * rv[0], z: lat * rv[1]};
}
function latTry(sign){
  const rv = [[1,0],[0,-1],[-1,0],[0,1]];
  let v = rv[face];
  tryRoll({x: sign * v[0], z: sign * v[1]});
  if(!act){
    // blocked straight ahead: try whipping the tower a quarter turn in your direction
    const of = face;
    face = (face + sign + 4) % 4;
    v = rv[face];
    tryRoll({x: sign * v[0], z: sign * v[1]});
    if(!act) face = of;
  }
}
function tryRoll(d){
  const tx = G.x + d.x, tz = G.z + d.z;
  if(!inB(tx, tz)) return;
  if(patAt(tx, G.y, tz) >= 0) return;          // the slider is a moving wall
  const ch = cellAt(tx, G.y, tz);
  if(ch === 'D'){
    if(hasKey){ vox[G.y][tz][tx] = '.'; hasKey = false; dirty = true; showMsg("unlocked"); }
    else if(lockMsgCd <= 0){ showMsg("locked. find the key."); lockMsgCd = 2; }
    return;
  }
  if(ch === 'E' || ch === 'R' || ch === 'U'){
    if(frozen > 0){ vox[G.y][tz][tx] = '.'; dirty = true; showMsg("frozen solid. it shatters."); }
    else if((ch === 'R' && pcol === 1) || (ch === 'U' && pcol === 2)){
      lastDir = d; startAct('roll', tx, G.y, tz, d);   // same color: it lets you pass
    }
    else die(ch === 'E' ? "grey never forgives." : "wrong color. it bites.");
    return;
  }
  if(ch === 'm' || ch === 'n'){
    if((ch === 'm' && pcol === 1) || (ch === 'n' && pcol === 2)){ lastDir = d; startAct('roll', tx, G.y, tz, d); }
    else if(lockMsgCd <= 0){ showMsg("the membrane wants " + (ch === 'm' ? "red" : "blue") + "."); lockMsgCd = 1; }
    return;
  }
  if(ch === '#' || ch === '='){
    if(free(tx, G.y + 1, tz) && free(G.x, G.y + 1, G.z)){ lastDir = d; startAct('climb', tx, G.y + 1, tz, d); }
    return;
  }
  if(isSolid(ch)) return;
  const b1 = cellAt(tx, G.y - 1, tz);
  if(isSolid(b1)){
    lastDir = d; startAct('roll', tx, G.y, tz, d);
    return;
  }
  // edge: topple over, then land() chains cell-by-cell falls until something stops you
  lastDir = d; startAct('down', tx, G.y - 1, tz, d);
}
function airStep(){
  const idir = inputDir();
  if(idir && !airLat){
    airDrift = {x: idir.x, z: idir.z};                // momentum arms even against a wall
    const tx = G.x + idir.x, tz = G.z + idir.z;
    if(inB(tx, tz)){
      const ch = cellAt(tx, G.y, tz);
      if(ch === 'E' || ch === 'R' || ch === 'U'){ die("clipped it mid-air."); return 'dead'; }
      if(ch !== '^' && !isSolid(ch)){
        airLat = true;
        let dty = G.y;
        if(airV > 0){
          const up2 = cellAt(tx, G.y + 1, tz);
          if(up2 !== '^' && !isSolid(up2)){ dty = G.y + 1; airV--; }
        } else {
          const dn2 = cellAt(tx, G.y - 1, tz);
          if(dn2 !== '^' && !isSolid(dn2)) dty = G.y - 1;
        }
        if(dty !== G.y && cellAt(tx, G.y, tz) === 'o'){
          vox[G.y][tz][tx] = '.'; coins++; dirty = true; updateCoinHud();
          showMsg("coin. " + coins + "/" + COINS.quota + ".");
        }
        startAct('air', tx, dty, tz, null);
        return 'act';
      }
    }
  }
  if(airV <= 0){
    const b0 = cellAt(G.x, G.y - 1, G.z);
    if(b0 !== '^' && isSolid(b0)){ airV = null; airLat = false; airDrift = 0; return 'down'; }
  }
  if(airDrift && !airLat){
    const tx = G.x + airDrift.x, tz = G.z + airDrift.z;
    const ch = inB(tx, tz) ? cellAt(tx, G.y, tz) : '#';
    if(ch !== 'E' && ch !== 'R' && ch !== 'U' && ch !== '^' && !isSolid(ch)){
      airLat = true;

        const up2 = cellAt(tx, G.y + 1, tz);
        if(up2 !== '^' && !isSolid(up2)){ dty = G.y + 1; airV--; }
      } else {
        const dn2 = cellAt(tx, G.y - 1, tz);
        if(dn2 !== '^' && !isSolid(dn2)) dty = G.y - 1;
      }
      if(dty !== G.y && cellAt(tx, G.y, tz) === 'o'){
        vox[G.y][tz][tx] = '.'; coins++; dirty = true; updateCoinHud();
        showMsg("coin. " + coins + "/" + COINS.quota + ".");
      }
      startAct('air', tx, dty, tz, null);
      return 'act';
    }
    airDrift = 0;                                     // momentum dies on the wall; it never suicides
  }
  if(airV > 0){
    if(cellAt(G.x, G.y + 1, G.z) === '^'){ airV = 0; showMsg("bonk. teeth graze you."); }
    if(free(G.x, G.y + 1, G.z)){ airV--; airLat = false; startAct('air', G.x, G.y + 1, G.z, null); return 'act'; }
    airV = 0; airLat = false; // bonk: drop into the descent branch this same step

  if(!isSolid(below)){ airLat = false; startAct('air', G.x, G.y - 1, G.z, null); return 'act'; }

function land(){
  if(act.type === 'roll' || act.type === 'climb' || act.type === 'down'){
    const axis = new THREE.Vector3(act.dz, 0, -act.dx).normalize();
    const q = new THREE.Quaternion().setFromAxisAngle(axis, act.type === 'roll' ? Math.PI / 2 : Math.PI);
    baseQ.premultiply(q).normalize();
  }
  G.x = act.tx; G.y = act.ty; G.z = act.tz;
  act = null;
  roller.quaternion.copy(baseQ);
  player.position.copy(cellCenter(G.x, G.y, G.z));
  if(cellAt(G.x, G.y, G.z) === 'o'){
    vox[G.y][G.z][G.x] = '.'; coins++; dirty = true; updateCoinHud();
    showMsg("coin. " + coins + "/" + COINS.quota + ".");
  }
  if(airV !== null){
    if(airStep() !== 'down') return;
  }
  const ch = cellAt(G.x, G.y, G.z);
  if(ch === 'K'){ vox[G.y][G.z][G.x] = '.'; hasKey = true; dirty = true; showMsg("key collected"); }
  else if(ch === 'F'){ frozen = 6; showMsg("time frozen 6s"); }
  else if(ch === 'A'){ boostT = 8; showMsg("the line smells blood."); }
  else if(ch === 'O'){ coolT = 6; showMsg("coolant. the line cools off."); }
  else if(ch === 'T'){
    for(const t of TELE){
      if(t.src[0] === G.x && t.src[1] === G.z && t.src[2] === G.y){
        G.x = t.dst[0]; G.z = t.dst[1]; G.y = t.dst[2];
        player.position.copy(cellCenter(G.x, G.y, G.z));
        showMsg("elsewhere.");
        break;
      }
    }
  }
  else if(ch === 'g'){
    vox[G.y][G.z][G.x] = '.'; dirty = true;
    checkpoint = {x: G.x, y: G.y, z: G.z};
    gateIdx++;
    snapshot();
    camH = Math.max(camH, G.y - 1.6);
    showMsg("checkpoint banked. the line quickens.");
  }
  else if(ch === 'r'){ setPcol(1); }
  else if(ch === 'u'){ setPcol(2); }
  else if(ch === 'J'){
    airV = 4; airLat = false; hangSteps = 2; airDrift = 0; showMsg("sproing.");
    if(airStep() !== 'down') return;
  }
  else if(ch === 'C'){ vox[G.y][G.z][G.x] = '.'; dirty = true; startRing(); return; }
  else if(ch === 'L'){
    let onNow = false;
    for(const b of BRIDGES){
      const mine = (b.lever[0] === G.x && b.lever[1] === G.z && b.lever[2] === G.y) ||
                   (b.levers2 || []).some(lv => lv[0] === G.x && lv[1] === G.z && lv[2] === G.y);
      if(!mine) continue;
      b.on = !b.on; onNow = b.on;
      for(const [bx, bz, by] of b.cells)            vox[by][bz][bx] = b.on ? '=' : '.';
      for(const [bx, bz, by] of (b.icells || []))   vox[by][bz][bx] = b.on ? '.' : '=';
    }
    dirty = true; showMsg(onNow ? "clunk. somewhere, a bridge slams into place." : "shhk. somewhere, it withdraws.");
  }
  else if(ch === 'G'){
    if(coins >= COINS.quota){ won = true; showMsg("section cleared. press R to run it again."); return; }
    showMsg("the gate counts coins. " + coins + "/" + COINS.quota + ". it stays shut.");
  }
  else if(ch === '^'){
    showMsg("impaled. it lets you go.");
    airV = 2; airLat = false; airDrift = 0; hangSteps = 0;
    if(airStep() !== 'down') return;
  }
  const below = cellAt(G.x, G.y - 1, G.z);
  if(below === '~'){ die("burned by the core."); return; }
  if(below === 'E' || below === 'R' || below === 'U'){
    die("its back is not a road."); return;
  }
  if(!isSolid(below)) startAct('fall', G.x, G.y - 1, G.z, null);
}

const keys = {};
function update(dt){
  if(won) return;
  if(boostT > 0) boostT -= dt;
  if(coolT > 0) coolT -= dt;
  flow = (act || airV !== null) ? Math.min(5, flow + dt * 1.2) : Math.max(0, flow - dt * 2.5);
  for(let i = 0; i < PATROLS.length; i++){
    const p = PATROLS[i], st = patState[i];
    if(frozen > 0) break;                      // freeze stops the sliders too
    st.t += dt;
    if(st.t >= p.step){
      st.t = 0;
      st.k = (st.k + 1) % p.cells.length;   // one-way conveyor: it never comes back at you
      const c = p.cells[st.k];
      const pcx = act ? act.tx : G.x, pcy = act ? act.ty : G.y, pcz = act ? act.tz : G.z;
      if(airV === null && pcx === c[0] && pcz === c[1] && pcy === c[2]){
        if(act){ G.x = act.tx; G.y = act.ty; G.z = act.tz; act = null; player.position.copy(cellCenter(G.x, G.y, G.z)); }
        const ox = G.x < 1 ? -1 : G.x > 4 ? 1 : 0, oz = (ox === 0) ? (G.z < 1 ? -1 : 1) : 0;
        showMsg("swept off the edge.");
        startAct('roll', G.x + ox, G.y, G.z + oz, null);
      }
    }
  }
  if(frozen > 0) frozen -= dt;
  else {
    let rate = RISE + gateIdx * 0.07 + (boostT > 0 ? 0.5 : 0) - (coolT > 0 ? 0.25 : 0) - 0.04 * flow;
    camH += Math.max(0.15, rate) * dt * (G.y - camH > 5 ? 4 : 1); // never waits; flow and coolant soothe it, accelerators enrage it
  }
  dangerPlane.material.color.setHex(boostT > 0 ? 0xff5a1f : coolT > 0 ? 0x3a78d9 : 0xc92a2a);
  if(lockMsgCd > 0) lockMsgCd -= dt;

  if(!rotating && !act){
    const RV = [[1,0],[0,-1],[-1,0],[0,1]][face]; // camera right
    const FV = [[0,-1],[-1,0],[0,1],[1,0]][face]; // into the screen
    if(keys['fwd'] || keys['back']){
      tryRoll(inputDir());
    } else {
      const lat = (keys['d'] || keys['arrowright']) ? 1 : (keys['a'] || keys['arrowleft']) ? -1 : 0;
      if(lat) latTry(lat);
    }
  }

  // face selection with hysteresis (corner cells keep the previous face)
  const dx = G.x + 0.5 - CX, dz = G.z + 0.5 - CX, ax = Math.abs(dx), az = Math.abs(dz);
  if(Math.abs(ax - az) > 0.35) face = az > ax ? (dz > 0 ? 0 : 2) : (dx > 0 ? 1 : 3);

  if(G.y < camH - 6) die("dropped out of frame.");
}

  const old = vox[r].map(row => row.slice());
  for(let z = 0; z < W; z++) for(let x = 0; x < W; x++)
    vox[r][x][W - 1 - z] = old[z][x];
  if(carried){
    const ox = G.x; G.x = W - 1 - G.z; G.z = ox;
    scene.add(player);
  }
  let guard = 0;
  while(guard++ < 4 && isSolid(cellAt(G.x, G.y, G.z))) G.y++;
  player.position.copy(cellCenter(G.x, G.y, G.z));
  rotating = null; activeRing = null; dirty = true;
  const below = cellAt(G.x, G.y - 1, G.z);
  if(below === '~') die("burned by the core.");
  else if(!isSolid(below)) startAct('fall', G.x, G.y - 1, G.z, null);
}

// ---------- input ----------
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
  keys[k] = true;
  if(k === 'r') resetRun(true);
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
addEventListener('contextmenu', e => e.preventDefault());
addEventListener('selectstart', e => e.preventDefault());
addEventListener('keydown', e => {
  if(e.key.toLowerCase() === 'p'){
    paused = !paused;
    const pb = document.getElementById('pausebtn'); if(pb) pb.textContent = paused ? '\u25B6' : '\u23F8';
    showMsg(paused ? "paused." : "unpaused.");
  }
});
if(typeof document.createElement === 'function'){
const pb = document.createElement('div');
pb.id = 'pausebtn'; pb.textContent = '\u23F8';
pb.style.cssText = 'position:fixed;top:12px;right:12px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#1f2940cc;color:#cfe0ff;border:1px solid #3a4a6a;border-radius:9px;font-size:17px;z-index:30;cursor:pointer;user-select:none;';
pb.addEventListener('click', () => {
  paused = !paused; pb.textContent = paused ? '\u25B6' : '\u23F8';
  showMsg(paused ? "paused." : "unpaused.");
});
document.body.appendChild(pb);
const ch2 = document.createElement('div');
ch2.id = 'coinhud';
ch2.style.cssText = 'position:fixed;top:12px;right:58px;height:38px;display:flex;align-items:center;padding:0 12px;background:#1f2940cc;color:#ffd34d;border:1px solid #3a4a6a;border-radius:9px;font-size:14px;z-index:30;user-select:none;font-family:inherit;';
document.body.appendChild(ch2);
const pad = document.createElement('div');
pad.id = 'dpad';
pad.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:30;user-select:none;';
function mkBtn(txt, key){
  const b = document.createElement('div');
  b.textContent = txt;
  b.style.cssText = 'width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:#1f2940aa;color:#cfe0ff;border:1px solid #3a4a6a;border-radius:14px;font-size:28px;cursor:pointer;touch-action:none;';
  b.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); keys[key] = true; });
  const off = () => { keys[key] = false; };
  b.addEventListener('pointerup', off); b.addEventListener('pointercancel', off); b.addEventListener('pointerleave', off);
  pad.appendChild(b); return b;
}
padBack = mkBtn('\u2039', 'back');
padFwd  = mkBtn('\u203A', 'fwd');
document.body.appendChild(pad);
}
function updateCoinHud(){
  const el = (typeof document.getElementById === 'function') ? document.getElementById('coinhud') : null;
  if(el) el.textContent = '\u25C6 ' + coins + ' / ' + COINS.quota;
}
updateCoinHud();
// lateral touch: hold either half of the screen
let touchPtr = null;
function setTouch(x){ keys['fwd'] = keys['back'] = false; if(x !== null) keys[x > innerWidth / 2 ? 'fwd' : 'back'] = true; }
canvas.addEventListener('pointerdown', e => { e.preventDefault(); touchPtr = e.pointerId; setTouch(e.clientX); });
canvas.addEventListener('pointermove', e => { if(e.pointerId === touchPtr) setTouch(e.clientX); });
['pointerup','pointercancel'].forEach(ev => addEventListener(ev, e => {
  if(e.pointerId === touchPtr){ touchPtr = null; setTouch(null); }
}));

// ---------- loop ----------
resetRun(true);
const bridgeGhostGroup = new THREE.Group(); scene.add(bridgeGhostGroup);
const bridgeGhostMat = new THREE.MeshBasicMaterial({ color: 0x57e0c4, transparent: true, opacity: 0.22 });
const bridgeGhostList = [];
for(const b of BRIDGES) for(const [bx, bz, by] of b.cells){
  const m = new THREE.Mesh(box, bridgeGhostMat);
  m.position.set(bx + 0.5 - CX, by + 0.5, bz + 0.5 - CX);
  m.scale.set(0.96, 0.96, 0.96);
  bridgeGhostGroup.add(m); bridgeGhostList.push({m, bx, bz, by});
}
const patGroup = new THREE.Group(); scene.add(patGroup);
const patMeshes = PATROLS.map(() => {
  const m = new THREE.Mesh(box, mat(0x4f3a78));
  m.scale.setScalar(0.92);
  m.add(edgeLine(0xb89bff));
  patGroup.add(m);
  return m;
});
function refreshBridgeGhosts(){ for(const g of bridgeGhostList) g.m.visible = vox[g.by][g.bz][g.bx] !== '='; }
refreshBridgeGhosts();
rebuildBlocks();
let camA = 0, camDist = 15, last = performance.now();
function lerpAngle(a, b, t){
  let d = ((b - a + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
  return a + d * t;
}
function frame(now){
  if(paused){ last = now; renderer.render(scene, camera); requestAnimationFrame(frame); return; }
  if(padFwd){
    padFwd.style.background  = keys['fwd']  ? '#3a78d9cc' : '#1f2940aa';
    padBack.style.background = keys['back'] ? '#3a78d9cc' : '#1f2940aa';
  }
  const dt = Math.min((now - last) / 1000, 0.05); last = now;
  update(dt);

  // advance current move
  if(act && !rotating && !won){
    act.t += dt;
    const k = Math.min(act.t / act.dur, 1);
    const cf = cellCenter(act.fx, act.fy, act.fz), ct = cellCenter(act.tx, act.ty, act.tz);
    if(act.type === 'roll' || act.type === 'climb' || act.type === 'down'){
      // roll: 90deg bottom edge. climb: 180deg up over the block edge. down: 180deg down around the ledge edge
      const py = act.type === 'climb' ? cf.y + 0.5 : cf.y - 0.5;
      const pivot = new THREE.Vector3((cf.x + ct.x) / 2, py, (cf.z + ct.z) / 2);
      const axis = new THREE.Vector3(act.dz, 0, -act.dx).normalize();
      const q = new THREE.Quaternion().setFromAxisAngle(axis, k * (act.type === 'roll' ? Math.PI / 2 : Math.PI));
      const off = cf.clone().sub(pivot).applyQuaternion(q);
      player.position.copy(pivot.add(off));
      roller.quaternion.copy(q).multiply(baseQ);
    } else if(act.type === 'bounce'){
      const p = cf.clone(); p.y += Math.sin(Math.PI * k) * 0.32;
      player.position.copy(p);
    } else {
      const p = cf.clone().lerp(ct, k);
      if(act.type === 'hop') p.y += Math.sin(Math.PI * k) * 0.55;
      if(act.type === 'air' && act.fx === act.tx && act.fy === act.ty && act.fz === act.tz) p.y += Math.sin(Math.PI * k) * 0.10;
      player.position.copy(p);
    }
    if(k >= 1) land();
  }

  if(rotating){
    rotating.t += dt / 0.8;
    const k = Math.min(rotating.t, 1), e2 = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2;
    ringGroup.rotation.y = -e2 * Math.PI / 2;
    if(k >= 1) finishRing();
  }
  if(dirty){ rebuildBlocks(); refreshBridgeGhosts(); }
  for(let i = 0; i < PATROLS.length; i++){
    const p = PATROLS[i], st = patState[i];
    const c = p.cells[st.k];
    const nk = Math.max(0, Math.min(p.cells.length - 1, st.k + st.dir));
    const n = p.cells[nk];
    const f = Math.min(1, st.t / p.step);
    patMeshes[i].position.set(
      c[0] + (n[0] - c[0]) * f + 0.5 - CX,
      c[2] + 0.46,
      c[1] + (n[1] - c[1]) * f + 0.5 - CX);
  }

  lavaMat.emissiveIntensity = 0.75 + Math.sin(now / 300) * 0.25;
  spinners.forEach(s => { s.rotation.y += dt * 2; });
  if(!(rotating && carried))
    faceG.rotation.y = lerpAngle(faceG.rotation.y, face * Math.PI / 2, Math.min(1, dt * 9));

  // drop shadow under the player (depth cue)
  {
    const scx = Math.floor(player.position.x + CX), scz = Math.floor(player.position.z + CX);
    let sy = -1;
    for(let yy = Math.floor(player.position.y - 0.501); yy >= 0; yy--)
      if(isSolid(cellAt(scx, yy, scz))){ sy = yy + 1; break; }
    if(sy >= 0){ shadow.visible = true; shadow.position.set(player.position.x, sy + 0.02, player.position.z); }
    else shadow.visible = false;
  }
  // camera leans toward corners: square-on mid-face, 45deg on the corner cell
  let targetA;
  if(rotating && carried){
    targetA = face * Math.PI / 2 + ringGroup.rotation.y;
  } else {
    const aBase = face * Math.PI / 2;
    const lat = player.position.x * Math.cos(aBase) - player.position.z * Math.sin(aBase);
    const axx = Math.abs(player.position.x), azz = Math.abs(player.position.z);
    const ratio = Math.max(axx, azz) > 0.01 ? Math.min(axx, azz) / Math.max(axx, azz) : 0;
    targetA = aBase + Math.sign(lat) * ratio * ratio * (Math.PI / 4);
  }
  camA = lerpAngle(camA, targetA, Math.min(1, dt * 8));
  updateGhosts(dt);
  viewH += (Math.max(G.y, camH - 2) + 0.6 - viewH) * Math.min(1, dt * 4.5);
  camera.position.set(Math.sin(camA) * camDist, viewH + camDist * 0.55, Math.cos(camA) * camDist);
  camera.lookAt(0, viewH + 0.2, 0);
  dangerPlane.position.y = camH - 5.0;
  dangerPlane.material.opacity = 0.2 + 0.13 * (0.5 + 0.5 * Math.sin(performance.now() / 240));

  document.getElementById('face').textContent = FACE_NAMES[face];
  document.getElementById('pips').textContent = FACE_NAMES.map((_, i) => i === face ? '\u25CF' : '\u25CB').join('');
  document.getElementById('key').textContent = hasKey ? 'yes' : 'no';
  document.getElementById('stat').textContent =
    won ? 'cleared' : 'act ' + Math.min(gateIdx + 1, GATES.length + 1) + '/' + (GATES.length + 1) + ' - ' + (grace > 0 ? 'camera rises in ' + Math.ceil(grace) + 's' : frozen > 0 ? 'time frozen ' + Math.ceil(frozen) + 's' : 'camera is rising');
  if(msgT > 0){ msgT -= dt; if(msgT <= 0) document.getElementById('msg').style.opacity = 0; }

  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(canvas.width !== Math.floor(w * renderer.getPixelRatio()) || canvas.height !== Math.floor(h * renderer.getPixelRatio())){
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
    const halfH = Math.atan(Math.tan(camera.fov * Math.PI / 360) * camera.aspect);
    camDist = Math.max(12.5, 6.0 / Math.tan(halfH));
  }
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>

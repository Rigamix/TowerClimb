<script>
// ---------------------------------------------------------------------------
// playground v3: the press is parked. the puzzle layer arrives —
// sand floors that crumble once crossed, a key found early for a chest
// found late, wall mazes on every ring, two counter-rotating bands,
// pads that now fire when rolled onto (the v2 bug), and more spikes.
// ---------------------------------------------------------------------------
const N = 20, H = 64;
const P = [];
for(let x = 0; x < 5; x++) P.push([x, 5]);
for(let z = 5; z > 0; z--) P.push([5, z]);
for(let x = 5; x > 0; x--) P.push([x, 0]);
for(let z = 0; z < 5; z++) P.push([0, z]);
const ANGraw = P.map(([x, z]) => Math.atan2(x - 2.5, z - 2.5));
const ANG = []; let acc0 = ANGraw[0];
for(let i = 0; i < N; i++){
  if(i > 0){ let d = ANGraw[i] - ANGraw[i - 1]; while(d <= 0) d += Math.PI * 2; acc0 += d; }
  ANG.push(acc0);
}
const TWO = Math.PI * 2;
const angOf = K => ANG[((K % N) + N) % N] + TWO * Math.floor(K / N);
const midOf = K => (angOf(K) + angOf(K + 1)) / 2;
const angAt = p => { const f = Math.floor(p); return angOf(f) + (angOf(f + 1) - angOf(f)) * (p - f); };
const Pat = p => { const f = ((Math.floor(p) % N) + N) % N, c = (f + 1) % N, fr = p - Math.floor(p);
  return [P[f][0] + (P[c][0] - P[f][0]) * fr, P[f][1] + (P[c][1] - P[f][1]) * fr]; };
const mod = c => ((c % N) + N) % N;
const Kk = (c, r) => mod(c) + ',' + r;

// --- per-face sticky geometry: one source of truth shared by physics, render, and the editor's faceDir ---
const unit2 = (x, z) => { const m = Math.hypot(x, z) || 1; return [x / m, 0, z / m]; };
function cardinalOut(c){ const ox = P[mod(c)][0] - 2.5, oz = P[mod(c)][1] - 2.5; return Math.abs(ox) >= Math.abs(oz) ? [Math.sign(ox) || 1, 0, 0] : [0, 0, Math.sign(oz) || 1]; }
function faceDirG(c, F){                                   // outward normal of face F (away from the block, toward the clung hero)
  if(F === 'B') return [0, -1, 0];                          // ceiling underside
  if(F === 'T') return [0, 1, 0];                           // top
  if(F === 'L'){ const a = P[mod(c)], b = P[mod(c - 1)]; return unit2(b[0] - a[0], b[1] - a[1]); }
  if(F === 'R'){ const a = P[mod(c)], b = P[mod(c + 1)]; return unit2(b[0] - a[0], b[1] - a[1]); }
  const o = cardinalOut(c); return F === 'O' ? o : [-o[0], 0, -o[2]];
}
const clHeroCol = (bc, F) => F === 'L' ? mod(bc - 1) : F === 'R' ? mod(bc + 1) : mod(bc);   // column the hero occupies while clung
const clTang = F => F === 'B' || F === 'T';                 // horizontal faces you crawl along; L/R/O/I are vertical faces you walk up the side of

// --- scene scaffolding ---

renderer.shadowMap.type = THREE.BasicShadowMap;    // crispest possible edge (aliasing accepted)
// (ART FORK) FLAT shading: route every Lambert material through Phong (per-fragment shadows) and override the
// fragment output so each surface is its PURE BASE COLOR where lit and PURE BLACK where the sun's shadow falls
// — no light-angle shading, no distance falloff. getShadowMask() is 1 (lit) / 0 (shadowed), hard with BasicShadowMap.
THREE.MeshLambertMaterial = THREE.MeshPhongMaterial;
THREE.MeshPhongMaterial.prototype.onBeforeCompile = function(shader){
  // pass the WORLD normal so each face gets a flat tone by orientation (top brightest, two side tones)
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vWNArt;\nvarying float vYArt;')
    .replace('#include <beginnormal_vertex>', '#include <beginnormal_vertex>\n\tvWNArt = objectNormal;')   // OBJECT-space normal: each face's tone is fixed and never shifts as the tower rotates
    .replace('#include <begin_vertex>', '#include <begin_vertex>\n\tvYArt = ( modelMatrix * vec4( transformed, 1.0 ) ).y;');   // world height for the ramp
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vWNArt;\nvarying float vYArt;\nvec3 a_rgb2hsv(vec3 c){ vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0); vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g)); vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r)); float d=q.x-min(q.w,q.y); float e=1.0e-10; return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x); }\nvec3 a_hsv2rgb(vec3 c){ vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0); vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y); }\nfloat a_b2(vec2 a){ a=floor(a); return fract(a.x*0.5 + a.y*a.y*0.75); }\nfloat a_b4(vec2 a){ return a_b2(0.5*a)*0.25 + a_b2(a); }\nfloat artDither(vec2 a){ return a_b4(0.5*a)*0.25 + a_b2(a); }')
    .replace('#include <shadowmap_pars_fragment>', '#include <shadowmap_pars_fragment>\n#include <shadowmask_pars_fragment>')   // Phong omits getShadowMask() — pull it in
    .replace('gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
      'gl_FragColor = vec4( diffuseColor.rgb * getShadowMask(), diffuseColor.a );');   // items / special blocks: flat base colour + shadow (no tint -> coins & keys stay gold)
};
function heroCompile(shader){   // (ART FORK) hero = single colour with only a SUBTLE per-face variation, sharp black shadow
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vHN;\nvarying vec3 vHP;')
    .replace('#include <beginnormal_vertex>', '#include <beginnormal_vertex>\n\tvHN = objectNormal;\n\tvHP = position;');   // object normal + local position (unit cube -0.5..0.5) for the INSET edge outline
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vHN;\nvarying vec3 vHP;\nvec3 h_rgb2hsv(vec3 c){ vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0); vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g)); vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r)); float d=q.x-min(q.w,q.y); float e=1.0e-10; return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x); }\nvec3 h_hsv2rgb(vec3 c){ vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0); vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y); }')
    .replace('#include <shadowmap_pars_fragment>', '#include <shadowmap_pars_fragment>\n#include <shadowmask_pars_fragment>')
    .replace('gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
      'float hUp = normalize(vHN).y; vec3 hHSV = h_rgb2hsv(diffuseColor.rgb); if(hUp>0.55){ hHSV.z=min(1.0,hHSV.z*1.04); } else { hHSV.x=fract(hHSV.x + vHN.x*0.022 + vHN.z*0.013); hHSV.z*=0.94; } vec3 hCol = h_hsv2rgb(hHSV);\n'
    + ' vec3 hAP = abs(vHP); vec3 hAN = abs(normalize(vHN));\n'
    + ' float hIP = hAN.x>0.5 ? max(hAP.y,hAP.z) : ( hAN.y>0.5 ? max(hAP.x,hAP.z) : max(hAP.x,hAP.y) );\n'   // in-plane distance from face centre
    + ' if( 0.5 - hIP < 0.05 ) hCol = emissive;\n'   // INSET outline band — colour driven by the material's emissive (blue normally, RED during the death flash)
    + ' float hFog = smoothstep(11.0,33.0,length(vViewPosition)); hCol = mix(hCol, vec3(0.937,0.902,0.824), hFog);\n'   // fog the lit colour, then x shadow so the shadow stays pitch black
    + ' gl_FragColor = vec4( hCol * getShadowMask(), diffuseColor.a );');
}
function blockCompile(shader){   // (ART FORK) DEFAULT blocks: top = base colour, side faces = a fixed #f781a9 (own shader so items aren't affected)
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vBN;\nvarying float vBY;')
    .replace('#include <beginnormal_vertex>', '#include <beginnormal_vertex>\n\tvBN = objectNormal;')
    .replace('#include <begin_vertex>', '#include <begin_vertex>\n\tvBY = ( modelMatrix * vec4( transformed, 1.0 ) ).y;');
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vBN;\nvarying float vBY;\nvec3 b_rgb2hsv(vec3 c){ vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0); vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g)); vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r)); float d=q.x-min(q.w,q.y); float e=1.0e-10; return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x); }\nvec3 b_hsv2rgb(vec3 c){ vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0); vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y); }')
    .replace('#include <shadowmap_pars_fragment>', '#include <shadowmap_pars_fragment>\n#include <shadowmask_pars_fragment>')
    .replace('gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
      'float bUp = normalize(vBN).y; float bH = clamp((vBY-2.0)/60.0,0.0,1.0); vec3 bSrc = bUp>0.55 ? diffuseColor.rgb : vec3(0.969,0.506,0.663); vec3 bHSV = b_rgb2hsv(bSrc); bHSV.x = fract(bHSV.x - bH*0.05); if(bUp>0.55){ bHSV.z = min(1.0, bHSV.z*1.08); } else if((vBN.x+vBN.z) > 0.0){ bHSV.z *= 0.82; } vec3 bCol = b_hsv2rgb(bHSV); float bFog = smoothstep(11.0,33.0,length(vViewPosition)); bCol = mix(bCol, vec3(0.937,0.902,0.824), bFog); gl_FragColor = vec4( bCol * getShadowMask(), diffuseColor.a );');   // 2 side tones; fog applied to LIT colour then x shadow -> shadow stays pitch black
}
function mobCompile(shader){   // (ART) "stomp" mob: TOP face = green (the safe landing surface), every SIDE face = the body's red. Colours the actual cube face, no extra plate.
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vMN;')
    .replace('#include <beginnormal_vertex>', '#include <beginnormal_vertex>\n\tvMN = objectNormal;');
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vMN;')
    .replace('#include <shadowmap_pars_fragment>', '#include <shadowmap_pars_fragment>\n#include <shadowmask_pars_fragment>')
    .replace('gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
      'vec3 mCol = normalize(vMN).y > 0.55 ? vec3(0.33,0.83,0.46) : diffuseColor.rgb; gl_FragColor = vec4( mCol * getShadowMask(), diffuseColor.a );');
}
// (ART FORK) interactable items: NO drop shadow
const artOutMat = new THREE.LineBasicMaterial({ color: 0x241f14 });
function artEdge(mesh){ if(mesh.userData._oe || !mesh.geometry) return; mesh.userData._oe = 1; mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), artOutMat)); }
function artDecorate(){   // (ART FORK) interactables: NO outline (removed), just strip their drop shadows
  for(const it of coinMeshes) it.m.traverse(o => { if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } });
  for(const it of chestMeshes) it.m.traverse(o => { if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } });
  for(const it of keyMeshes) it.m.traverse(o => { if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } });
  for(const M of MONSTERS){ if(M.grp) M.grp.traverse(o => { if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } }); }
  for(const it of spikeMeshes) it.m.traverse(o => { if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } });   // (ART FORK) spikes cast no drop shadow
}
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xefe6d2);   // (ART FORK) warm cream backdrop, closer to the concept
scene.fog = new THREE.Fog(0xefe6d2, 11, 33);   // (ART FORK) depth haze fading to the background colour (about half-strength)
const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x2a2418, 0.42));   // (ART FORK) lower ambient fill so the sun's shadows read dark
const sun = new THREE.DirectionalLight(0xffe8c0, 1.05); sun.position.set(6, 12, 8); scene.add(sun);
sun.castShadow = true;

sun.shadow.radius = 1;        // tight edge (sharp)
sun.shadow.normalBias = 0.03; // guard against acne from the camera-grazing sun
{ const sc = sun.shadow.camera; sc.left = -16; sc.right = 16; sc.top = 16; sc.bottom = -16; sc.near = 1; sc.far = 70; sc.updateProjectionMatrix(); }

const tower = new THREE.Group(); scene.add(tower);
const box = new THREE.BoxGeometry(1, 1, 1);
const plate = new THREE.BoxGeometry(0.98, 0.07, 0.98);
const edgeGeo = new THREE.EdgesGeometry(box);
const palette = [0xff6fa5, 0x5bc4e6, 0xf6d44a, 0x8e7bef];   // (ART FORK) one vibrant colour per TOWER SIDE (pink / teal / yellow / purple) for a readable shape
function edgeLine(c){ const l = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: c })); l.visible = false; return l; }   // (ART FORK) outlines removed (kept as a hidden node so the .material refs elsewhere stay valid)
const faceMat = new THREE.MeshLambertMaterial({ color: 0x14101c });
const miniCone = new THREE.ConeGeometry(0.11, 0.28, 4);
function setMouth(g, kind){
  const [b1, b2] = g.userData.bars;
  if(kind === 'neutral'){
    b1.position.set(-0.075, -0.11, 0); b1.rotation.z = 0;
    b2.position.set(0.075, -0.11, 0); b2.rotation.z = 0;

function makeFace(kind){

  const mk = (sx, sy) => { const e = new THREE.Mesh(box, faceMat); e.scale.set(sx, sy, 0.03); g.add(e); return e; };

function attachFaces(grp, sideKind, topKind){

// quantized depth grading: five bands, block by block, desaturated and sunk

const BG = new THREE.Color(0x10141d);
const DEPTH_BANDS = 5;

}

const hero = new THREE.Mesh(box, new THREE.MeshLambertMaterial({ color: 0xf5c518 }));   // (ART FORK) yellow hero
hero.scale.set(0.92, 0.92, 0.92);
hero.material.onBeforeCompile = heroCompile; hero.material.customProgramCacheKey = () => 'arthero'; hero.material.fog = false; hero.material.needsUpdate = true;   // (ART FORK) subtle per-face variation + manual fog

tower.add(hero);
// (ART FORK) hero eyes — two round DOT marks, billboarded to face the camera and ALWAYS drawn on top (never occluded)
const heroEyeMat = new THREE.MeshBasicMaterial({ color: 0x000000, depthTest: false, depthWrite: false });   // black eyes, always drawn above the outline
const heroEyeGeo = new THREE.CircleGeometry(0.055, 16);   // round dot (was a 0.038x0.18 tall plane = a line)
const heroFace = new THREE.Group();
{ const eL = new THREE.Mesh(heroEyeGeo, heroEyeMat); eL.position.set(-0.13, 0.04, 0); eL.renderOrder = 999; const eR = new THREE.Mesh(heroEyeGeo, heroEyeMat); eR.position.set(0.13, 0.04, 0); eR.renderOrder = 999; heroFace.add(eL, eR); }

  }
  if(mode === 'air'){            // (re-checked: a floating-mob kill above may have ended the air state — skip the physics, but never the frame's render/rAF)
    vy = Math.min(14, vy + 26 * dt);
    let ny = heroY - vy * dt;
    if(vy < 0){
      const head = Math.floor(ny + 0.999);
      const prevHead = Math.floor(heroY + 0.999);
      if(cspikes.has(Kk(col(), head)) && ny + 1 >= head + 0.5 && spikeLean() < SPIKE_LEAN){ die("the ceiling spikes."); ny = head; }   // (#2) only lethal once the cube's TOP reaches the visible down-cone tip (~mid-cell), not the instant it touches the cell edge
      else if(solid(col(), head)){
        if(faced(col(), head, 'B') && head !== prevHead && clGuard <= 0){ heroY = head - 1; clAttach(col(), head, 'B', Math.sign(rotVel) || 1); ny = head - 1; squash = 0.14; showMsg("stuck. the ceiling holds you."); }
        else if((faced(col(), head, 'O') || faced(col(), head, 'I')) && clGuard <= 0){ const FF = faced(col(), head, 'O') ? 'O' : 'I'; heroY = head; clAttach(col(), head, FF, 1); ny = head; squash = 0.14; showMsg("stuck."); }   // jump up into a front/inner sticky face -> grab it
        else { ny = head - 1; vy = 0.5; }
      }
    } else {
      const r0 = Math.floor(ny + 0.02);
      for(const M of MONSTERS){
        if(M.state !== 'alive' || (M.vert && M.type === 'spiky')) continue;   // vertical SPIKY stays deadly on contact (handled in the patrol); a vertical NORMAL freezes when stomped from above (like the ground stomp); a vertical MOUNT is a lift you land on
        const d = Math.abs(((col() - M.c + N / 2) % N + N) % N - N / 2);
        if(d < 0.6 && ny <= M.row + 1.08 && ny > M.row + 0.25 && vy > 2){
          if(M.type === 'spiky'){ heroY = M.row + 1; die("its top is teeth too."); break; }
          if(M.type === 'mount'){
            if(M.phase === 'frown'){ heroY = M.row + 1; die("it stopped smiling."); break; }
            ny = M.row + 1; vy = 0; mode = 'ground'; squash = 0.16; airCarry = 0;
            if(M.vert){ carrier = M; rideSteer = 0; rot = -angOf(K); rotTarget = rot; }   // (#1) vertical lift: bind directly (mountUnder won't, since the lift's row is fractional)
            if(M.rideT === 0) showMsg("it doesn't mind. for now.");
            continue;
          }
          M.state = 'frozen'; M.c = mod(Math.round(M.c)); if(M.vert) M.row = Math.round(M.row); M.thawT = 6;   // a vertical mob freezes at an integer row -> a clean solid platform (and the thaw's solidSet key matches)
          const under = Kk(M.c, M.row - 1);
          if(crackedSet.has(under)){
            crackedSet.delete(under); solidSet.delete(under); removeCell(under);
            const inBand = rr => BANDS.some(B => rr >= B.r0 && rr <= B.r1);
            let rr = M.row - 1;
            while(rr > 1 && (inBand(rr) || inBand(rr - 1) || !solid(M.c, rr - 1))) rr--;
            M.row = rr;
            solidSet.add(Kk(M.c, M.row));
            vy *= 0.6; squash = 0.1;
            showMsg("it goes straight through. follow it.");
          } else {
            solidSet.add(Kk(M.c, M.row));
            ny = M.row + 1; vy = 0; mode = 'ground'; squash = 0.2; airCarry = 0;
            showMsg("frozen stiff. briefly.");
          }
        }
      }
      if(mode === 'air'){
        const ck = Kk(col(), r0);
        if(spikes.has(Kk(col(), r0 + 1)) && !cspikes.has(Kk(col(), r0 + 1)) && ny <= r0 + 1.05 && spikeLean() < SPIKE_LEAN){   // (#2) FLOOR spike only (ceiling-spike cells handled by the rising check) + horizontal gate: landing at the rim of the column (not over the spikes) is survivable
          die("the spikes."); heroY = r0 + 1;
        } else if(crackedSet.has(ck) && vy >= CRACK_V){
          crackedSet.delete(ck); solidSet.delete(ck); removeCell(ck);
          vy *= 0.6; squash = 0.1;
          showMsg("it gives way.");
        } else if(solid(col(), r0)){
          ny = r0 + 1; airCarry = 0;
          const onPad = pads.has(Kk(col(), r0));
          if(onPad && padCombo > 0){                              // #2: pad-to-pad chain -> bounce straight off (no settle), higher
            const h = [2, 3, 4, 5][Math.min(padCombo, 3)]; vy = -Math.sqrt(2 * 26 * h); mode = 'air'; squash = 0; padCombo++; showMsg("sproing.");
          } else {
            vy = 0; mode = 'ground'; squash = 0.18;              // fresh landing -> settle; the ground branch waits a beat then launches (#6)
            if(!onPad) padCombo = 0;                             // landed on a non-pad -> reset the combo
            if(crackedSet.has(ck)){ bigMsg(CRACK_MSGS[Math.floor(Math.random() * CRACK_MSGS.length)]); }   // landed on a cracked block but too soft to break it -> tongue-in-cheek "jump from higher" hint
          }
        }
      }
    }
    heroY = ny;
    // roll / fall into a sticky side wall -> cling on contact, if you're pushing toward it.
    // forgiving vertical window: grab at ANY row the hero's body overlaps (was a single row -> felt like a tiny sweet spot)
    if(mode === 'air' && clGuard <= 0){
      const steer = rotTarget - rot;                                         // toward c+1 => steer<0; toward c-1 => steer>0 (keys OR drag)
      for(const s of [1, -1]){
        if(!(s > 0 ? (steer < -0.01) : (steer > 0.01))) continue;
        const nc = mod(col() + s), F = s > 0 ? 'L' : 'R';
        const rc = Math.floor(heroY + 0.02);   // (#5) grab ONLY at the feet row -> a wall flush beside you, never one above your head (that left you stuck diagonally beside a spike); and never grab into your own spike cell
        if(solid(nc, rc) && faced(nc, rc, F) && !solid(col(), rc) && !spikes.has(Kk(col(), rc))) clAttach(nc, rc, F, -s);   // -s: keep pushing into the wall => climb UP
        if(mode === 'cling') break;
      }
    }
  }
  if(mode !== 'dead') collectAt();
  if(squash > 0) squash = Math.max(0, squash - dt * 1.1);

  if(mode !== 'dead'){
    const ri = CUSTOM ? customBand(heroY) : roomIndex(heroY);
    if(ri > currentRoom){ currentRoom = ri; bankCoins = coinCount; if(!CUSTOM) showMsg(ROOM_NAMES[ri] + "."); }
  }
  if(heroY <= (CUSTOM ? CUSTOM.winY : 12.06) && respawnT === 0){ respawnT = 1.2; wonRun = true; showMsg(CUSTOM ? "you reached the bottom." : "the bottom. for now."); }
  if(respawnT > 0){
    respawnT -= dt;
    if(respawnT <= 0){ respawnT = 0; if(wonRun) resetRun("again, from the top."); else resetRoom(); }
  }

  rotVel = rotVel * 0.7 + ((rot - prevRot) / Math.max(dt, 1e-4)) * 0.3;
  prevRot = rot;

  // render
  tower.rotation.y = rot + rotLag;
  for(const b of bandCubes){
    const [x, z] = Pat(b.c + b.B.off);   // (#band) continuous world position — the platform slides smoothly with its float offset
    b.m.position.set(x - 2.5, b.r + 0.5, z - 2.5);
  }
  for(const cm of coinMeshes) cm.m.rotation.y += dt * 2.2;
  for(const km of keyMeshes) km.m.rotation.y += dt * 1.6;
  const sR = Math.sin(rot + rotLag), cR = Math.cos(rot + rotLag);
  for(const dd of depthReg){
    if(!dd.mesh.parent) continue;
    const z2 = -dd.mesh.position.x * sR + dd.mesh.position.z * cR;
    let b = Math.floor((3.6 - z2) / 1.45);
    b = Math.max(0, Math.min(DEPTH_BANDS - 1, b));
    if(b !== dd.lastBand){
      dd.lastBand = b;
      for(const e of dd.entries){
        e.mt.color.copy(e.graded[b]);
        if(e.mt.transparent) e.mt.opacity = e.baseOp * (1 - b * 0.17);
      }
    }
  }

  const glow = keyCount > 0 ? 0.35 + 0.25 * Math.sin(now * 0.006) : 0;
  for(const D of doorMeshes) D.m.material.emissive.setRGB(glow * 0.9, glow * 0.7, glow * 0.15);
  for(const M of MONSTERS){
    const i0 = Math.floor(M.c), f = M.c - i0;
    const p0 = P[mod(i0)], p1 = P[mod(i0 + 1)];
    const bob = M.state === 'alive' ? Math.sin(now * 0.004) * 0.05 : 0;
    M.grp.position.set(p0[0] + (p1[0] - p0[0]) * f - 2.5, M.row + 0.5 + bob, p0[1] + (p1[1] - p0[1]) * f - 2.5);
    if(M.state === 'frozen'){
      M.bodyMat.color.setHex(0x9fd8ef);
      const p2 = M.thawT < 1.6 ? 1 + Math.sin(now * 0.02) * 0.06 : 1;
      M.grp.scale.set(p2, 1, p2);
    } else {
      if(M.type === 'mount' && M.phase === 'frown'){
        const t = Math.max(0, Math.min(1, M.rideT - 2));
        const freq = 6 + t * 22;
        const blink = 0.5 + 0.5 * Math.sin(M.rideT * freq);
        const c = new THREE.Color(0xff2a2a).lerp(new THREE.Color(0xffffff), blink * (0.4 + 0.6 * t));
        M.bodyMat.color.copy(c);
        if(M.capMat) M.capMat.color.copy(c);                             // (#2) the TOP/cap flashes red too -> the WHOLE mount reads "about to kill", not just the sides
        M.grp.scale.setScalar(1 + 0.08 * t * blink);
      } else {
        M.bodyMat.color.setHex(M.type === 'spiky' ? 0xc0455a :
          M.type === 'mount' ? (M.phase === 'neutral' ? 0xd4b75f : 0x4fae6f) : 0xc0455a);   // stomp mob: RED sides like the spiky (mobCompile keeps the TOP face green); frozen -> blue above
        if(M.capMat) M.capMat.color.setHex(M.capCol);                    // (#2) not frowning -> the cap returns to its base colour
        M.grp.scale.setScalar(1);
      }
      M.grp.scale.set(1, 1, 1);
    }
  }

  if(stepUpKey !== null){                                  // (#3) STEP-ROLL render: roll the cube 180° up & over the step's top edge, by the input-driven progress (same look as a normal roll, no canned timing). rotLag is the view-recentre glide, set in the update in lockstep with the progress.
    const sp = Math.max(0, Math.min(1, stepUp));
    const qv = new THREE.Quaternion().setFromAxisAngle(climbAxis, sp * Math.PI);
    const vv = new THREE.Vector3(climbFrom[0] - climbPivot[0], climbFrom[1] - climbPivot[1], climbFrom[2] - climbPivot[2]).applyQuaternion(qv);
    hero.position.set(climbPivot[0] + vv.x, climbPivot[1] + vv.y, climbPivot[2] + vv.z);
    hero.quaternion.copy(qv);
    hero.scale.set(0.92 + squash * 0.5, 0.92 - squash * 0.8, 0.92 + squash * 0.5);
  } else if(climbA > 0){
    climbA = Math.max(0, climbA - dt);
    const e2 = 1 - climbA / CLIMB_DUR;
    const ee2 = e2 < 0.5 ? 2 * e2 * e2 : 1 - Math.pow(-2 * e2 + 2, 2) / 2;
    const qv = new THREE.Quaternion().setFromAxisAngle(climbAxis, ee2 * Math.PI);
    const vv = new THREE.Vector3(climbFrom[0] - climbPivot[0], climbFrom[1] - climbPivot[1], climbFrom[2] - climbPivot[2]).applyQuaternion(qv);
    hero.position.set(climbPivot[0] + vv.x, climbPivot[1] + vv.y, climbPivot[2] + vv.z);
    hero.quaternion.copy(qv);
    hero.scale.set(0.92, 0.92, 0.92);
    rotLag = rotLagInit * (1 - ee2);
    if(climbA === 0){ squash = 0.14; rotLag = 0; }
  } else if(mode === 'cling'){
    rotLag *= Math.pow(1e-4, dt / 0.32); if(Math.abs(rotLag) < 1e-4) rotLag = 0;
    const cc = clCell || [col(), Math.floor(heroY)];
    const bc = cc[0], br = cc[1];
    const n = faceDirG(bc, clFace);
    const bx = P[bc][0] - 2.5, bz = P[bc][1] - 2.5;
    let tx, ty, tz;
    if(clFace === 'B'){ tx = bx; ty = (br + 0.5) - 1.0 + squash * 0.4; tz = bz; }            // hang under the block
    else { tx = bx + n[0] * 0.96; ty = heroY + 0.5 - squash * 0.4; tz = bz + n[2] * 0.96; }  // rest against a vertical / top face
    if(clAnim > 0){                                                                          // ease around the corner — the cube PIVOTS ABOUT THE SHARED EDGE (clPiv), not its own centre
      clAnim = Math.max(0, clAnim - dt);
      const e = 1 - clAnim / CLING_TURN, ee = e < 0.5 ? 2 * e * e : 1 - Math.pow(-2 * e + 2, 2) / 2;
      const u = 1 - ee;                                                                     // quadratic Bézier clFrom -> (clPiv = corner pushed OUTSIDE the block) -> target: the cube centre swings AROUND the corner, never through it, and still lands EXACTLY
      hero.position.set(
        clFromX * u * u + clPivX * 2 * u * ee + tx * ee * ee,
        clFromY * u * u + clPivY * 2 * u * ee + ty * ee * ee,
        clFromZ * u * u + clPivZ * 2 * u * ee + tz * ee * ee);
      hero.quaternion.setFromAxisAngle(new THREE.Vector3(clAxisX, clAxisY, clAxisZ), ee * Math.PI / 2);   // cube rolls a clean 90° (symmetric -> reads upright at the end)
    } else if(clTang(clFace)){
      // #5: a HORIZONTAL crawl ROLLS the cube along the surface (continuous), like an inverted floor — no more one-frame snap between blocks
      const isTop = clFace === 'T';
      const hL2 = angOf(K) - midOf(K - 1), hR2 = midOf(K) - angOf(K);
      const da2 = (-(rot + rotLag)) - angOf(K);
      const g2 = da2 >= 0 ? Math.min(0.5, da2 / (2 * hR2)) : Math.max(-0.5, da2 / (2 * hL2));
      const sgn = g2 >= 0 ? 1 : -1;
      const c0 = P[col()], c1 = P[mod(K + sgn)];
      const d3 = new THREE.Vector3(c1[0] - c0[0], 0, c1[1] - c0[1]);
      const up3 = new THREE.Vector3(0, 1, 0);
      const axis = isTop ? up3.clone().cross(d3).normalize() : d3.clone().cross(up3).normalize();
      const q = new THREE.Quaternion().setFromAxisAngle(axis, Math.abs(g2) * Math.PI / 2);
      const pvY = isTop ? br + 1 : br;                       // the top face (br+1) or the ceiling underside (br) the cube rolls over
      const pivot = new THREE.Vector3(c0[0] - 2.5, pvY, c0[1] - 2.5).add(d3.clone().multiplyScalar(0.5));
      const off = d3.clone().multiplyScalar(-0.5).add(up3.clone().multiplyScalar(isTop ? 0.5 : -0.5)).applyQuaternion(q);
      hero.position.copy(pivot.add(off));
      hero.position.y += isTop ? -squash * 0.4 : squash * 0.4;
      hero.quaternion.copy(q);
    } else {
      // L/R/O/I vertical face: ROLL the cube up/down the wall (consistent with the ground walk / crawl) instead of sliding flat
      const up3 = new THREE.Vector3(0, 1, 0);
      const fr = heroY - Math.floor(heroY);                                   // 0..1 climb fraction within the current block
      const axis = new THREE.Vector3(n[0], 0, n[2]).cross(up3).normalize();   // horizontal roll axis (n × up) -> the cube tumbles up/down the wall
      const q = new THREE.Quaternion().setFromAxisAngle(axis, fr * Math.PI / 2);
      const pivot = new THREE.Vector3(bx + n[0] * 0.5, Math.floor(heroY) + 1, bz + n[2] * 0.5);   // the horizontal edge it rolls over (wall surface, block boundary)
      const off = new THREE.Vector3(n[0] * 0.46, -0.5, n[2] * 0.46).applyQuaternion(q);
      hero.position.copy(pivot.add(off));
      hero.quaternion.copy(q);
    }
    hero.scale.set(0.92 + squash * 0.5, 0.92 - squash * 0.8, 0.92 + squash * 0.5);
  } else {
  rotLag *= Math.pow(1e-4, dt / 0.32); if(Math.abs(rotLag) < 1e-4) rotLag = 0;
  const hL2 = angOf(K) - midOf(K - 1), hR2 = midOf(K) - angOf(K);
  const erot = rot + rotLag;            // the angle actually shown this frame
  const da2 = (-erot) - angOf(K);
  const bandFrac = K + (da2 >= 0 ? da2 / (2 * hR2) : da2 / (2 * hL2));   // hero's CONTINUOUS world column
  let g2, c0, c1;
  if(onBand && bandRef){                                                // (#band) on a moving floor: the cube TUMBLES from your WALK relative to the band, while the CARRY just glides it (no tilt, no blink)
    const lc = bandFrac - bandRef.off, bl0 = Math.round(lc);           // your continuous BAND-LOCAL column — the exact carry above keeps this constant while carried, so g2=0 (upright); walking changes it
    g2 = Math.max(-1, Math.min(1, lc - bl0));                          // roll fraction vs the nearest band block
    const s = g2 >= 0 ? 1 : -1;
    c0 = Pat(bandRef.off + bl0); c1 = Pat(bandRef.off + bl0 + s);      // pivot edge = the band BLOCK edge, moving WITH the platform (so the roll rides along)
  } else {
    g2 = (carryT > 0 || carrier) ? 0 : (da2 >= 0 ? Math.min(1, da2 / (2 * hR2)) : Math.max(-1, da2 / (2 * hL2)));   // upright on a mount; tumble on normal ground
    c0 = (carrier && rideFrac !== null) ? Pat(rideFrac) : P[col()];
    c1 = P[mod(K + (g2 >= 0 ? 1 : -1))];
  }
  const sgn = g2 >= 0 ? 1 : -1;
  const d3 = new THREE.Vector3(c1[0] - c0[0], 0, c1[1] - c0[1]);
  const up3 = new THREE.Vector3(0, 1, 0);
  const hang = mode === 'hang';
  const axis = hang ? d3.clone().cross(up3).normalize() : up3.clone().cross(d3).normalize();
  const phi = Math.abs(g2) * Math.PI / 2;
  const q = new THREE.Quaternion().setFromAxisAngle(axis, phi);
  if(yLag < 0) yLag = Math.min(0, yLag + dt / 0.16);
  const pvY = hang ? Math.floor(heroY) + 1 : heroY + yLag;
  const pivot = new THREE.Vector3(c0[0] - 2.5, pvY, c0[1] - 2.5).add(d3.clone().multiplyScalar(0.5));
  const off = d3.clone().multiplyScalar(-0.5).add(up3.clone().multiplyScalar(hang ? -0.5 : 0.5)).applyQuaternion(q);
  hero.position.copy(pivot.add(off));
  hero.position.y += hang ? squash * 0.4 : -squash * 0.4;
  hero.quaternion.copy(q);
  hero.scale.set(0.92 + squash * 0.5, 0.92 - squash * 0.8, 0.92 + squash * 0.5);
  }
  if(mode === 'dead' && deathBurstT > 0){ deathBurstT -= dt; if(deathBurstT <= 0) burstDeath(); }   // brief red flash, then explode
  hero.visible = mode !== 'dead' || deathBurstT > 0;
  updateDeathParts(dt);

  // (ART FORK) highlight the block under the hero by BRIGHTENING its own material — intrinsic, no overlay, no z-fight
  let glowC = -1, glowR = -1;
  if(mode === 'ground' || mode === 'air'){
    for(let r = Math.floor(heroY + 0.02) - 1; r >= 0 && r > heroY - 6; r--){ if(solid(col(), r)){ glowC = col(); glowR = r; break; } }
  }
  let wantMat = null;
  if(glowR >= 0){ const gk = Kk(glowC, glowR); for(const cb of cubeList){ if(cb.key === gk){ wantMat = cb.m.material; break; } } }
  if(wantMat !== glowMat){
    if(glowMat && glowMat.userData._base) glowMat.color.copy(glowMat.userData._base);
    if(wantMat){ if(!wantMat.userData._base) wantMat.userData._base = wantMat.color.clone(); wantMat.color.copy(wantMat.userData._base).lerp(ART_WHITE, 0.4); }
    glowMat = wantMat;
  }
  updateTrajectory();   // #3: draw/refresh the fall guide

  const leadT = (mode === 'air' && vy > 2) ? Math.min(3.5, vy * 0.3) : 0;
  camLead += (leadT - camLead) * Math.min(1, dt * 5);
  const camTargetY = (stepUpKey !== null) ? hero.position.y - 0.5 : heroY;   // (#4) only the step-roll keeps heroY on the lower floor until it commits (so follow the cube's rendered height there); EVERY other vault (climbA / cling corner-turn / vault-over-top) sets heroY to the DESTINATION immediately, so follow heroY (double-eased) -> the camera doesn't chase the corner-swing's outward BULGE, which read as a snap at the sticky-wall->top vault
  camFocusY += (camTargetY - camFocusY) * Math.min(1, dt * 8);                     // smoothed focus so cling-wrap heroY jumps don't snap the camera
  const onO = (mode === 'cling' && clFace === 'O');
  clCamPull += ((onO ? 1 : 0) - clCamPull) * Math.min(1, dt * 3);             // smooth ease in/out on outer faces
  const cornerDist = Math.min(...[0, 5, 10, 15].map(c => Math.abs(((col() - c + 10) % 20 + 20) % 20 - 10)));   // columns to the nearest tower corner
  camCornerPull += (Math.max(0, 1 - cornerDist / 2) - camCornerPull) * Math.min(1, dt * 3);   // gentle pull-back near a corner to see around it, then ease back
  const camZ = 14.5 + clCamPull * 3.4 + camCornerPull * 2.0;                  // 14.5 = a touch further back overall (#5); + corner pull-back (#4) + outer-face reveal
  const camY = camera.position.y || camFocusY + 4;
  camera.position.set(0, camY + (camFocusY + 4.2 + clCamPull * 2.2 - camLead - camY) * Math.min(1, dt * 4), camZ);
  const lookY = camera.position.y - 3.1 - clCamPull * 3.5;                    // (#4) derive the gaze from the SMOOTHED (double-eased) camera height, not raw camFocusY -> the look and the camera move together, so the view never pitch-snaps when heroY jumps at a vault. = camFocusY+1.1-camLead-clCamPull*1.3 at steady state.
  camera.lookAt(0, lookY, 0);          // tilt the gaze down a touch
  // (ART FORK) hero eyes face the camera, just in front of the cube
  hero.getWorldPosition(_hw); _hd.copy(camera.position).sub(_hw).normalize();
  heroFace.position.copy(_hw).addScaledVector(_hd, 0.5); heroFace.lookAt(camera.position); heroFace.visible = hero.visible;
  if(msgT > 0){ msgT -= dt; if(msgT <= 0) msgEl.textContent = ''; }
  if(bigT > 0){ bigT -= dt; if(bigT <= 0 && bigEl) bigEl.style.opacity = '0'; }
  // (ART FORK) the sun RIDES the camera: light sits at the camera position and aims where the camera looks, so shadows project straight from the viewer
  sun.position.copy(camera.position);
  sun.target.position.set(0, lookY, 0);   // (#4) match the (smoothed) gaze so shadows track the view without snapping
  sun.target.updateMatrixWorld();
  scene.traverse(o => { if(o.isMesh && o.userData._sh === undefined){ const s = o.scale; o.castShadow = (s.x >= 0.5 && s.y >= 0.5 && s.z >= 0.5); o.receiveShadow = true; o.userData._sh = 1; } });   // big solids cast; thin plates/decals only receive
  artDecorate();   // (ART FORK) strip drop shadows from interactables (after the shadow tagging so it wins)
  { const bandOf = (y) => CUSTOM ? customBand(y) : roomIndex(y), myBand = bandOf(heroY);   // (ART FORK) a gated door turns GOLD only when you hold a key AND it's on YOUR level (keyhole icon stays); grey otherwise
    for(const d of doorMeshes){ const onMyLevel = bandOf((+d.key.split(',')[1]) + 0.5) === myBand; d.m.material.color.setHex((keyCount > 0 && onMyLevel) ? 0xe8c44a : 0x252c40); } }
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
const CATCH_STONES = [];
CUSTOM = loadCustom();
resetRun(CUSTOM ? "your level — get to the bottom." : "six rooms between you and the bottom.");
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();
requestAnimationFrame(frame);
</script>
